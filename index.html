<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useEffect, useMemo, useState } = React;

    const EXAMS = ['1학기 중간고사', '1학기 기말고사', '2학기 중간고사', '2학기 기말고사'];
    const EXAM_SHORT_LABELS = { '1학기 중간고사':'1학기 중간', '1학기 기말고사':'1학기 기말', '2학기 중간고사':'2학기 중간', '2학기 기말고사':'2학기 기말' };
    const SCHOOL_OPTIONS = ['수억고', '파주고', '문산고', '율곡고', '세경고', '파주여고', '삼광고'];
    const SUBJECTS = ['국어', '영어', '수학', '과학'];
    const YEARS = [2026, 2027, 2028];
    const GRADES = [1, 2, 3];
    const SCORE_BUCKETS = [
      { label: '90-100', min: 90, max: 100 },
      { label: '80-89', min: 80, max: 89 },
      { label: '70-79', min: 70, max: 79 },
      { label: '60-69', min: 60, max: 69 },
      { label: '0-59', min: 0, max: 59 },
    ];

    const MENU_ITEMS = [
      { key: 'dashboard', label: '전체성적 분석', icon: 'fa-chart-column' },
      { key: 'manage', label: '성적입력', icon: 'fa-pen-to-square' },
      { key: 'teacherAnalysis', label: '선생님별 성적분석', icon: 'fa-chalkboard-user' },
      { key: 'schoolAnalysis', label: '학교별 성적분석', icon: 'fa-school' },
      { key: 'subjectAnalysis', label: '과목별 성적분석', icon: 'fa-book-open' },
      { key: 'studentAnalysis', label: '학생별 성적분석', icon: 'fa-user-graduate' },
      { key: 'teamExam', label: '시험 분석 아카이브', icon: 'fa-clipboard-list' },
    ];

    const ADMIN_TEACHER_NAME = '수최';
    const TEST_KEYWORDS = ['테스트', 'test', 'sample', '샘플', 'demo', '임시', 'tmp', 'temp', '가짜'];

    function getTierSystem(row) {
      const year = Number(row.year || 0);
      const grade = Number(row.grade || 0);
      if (year >= 2027) return 5;
      if (year === 2026 && grade === 3) return 9;
      return 5;
    }

    function bucketScore(score) {
      const n = Number(score || 0);
      const found = SCORE_BUCKETS.find((b) => n >= b.min && n <= b.max);
      return found ? found.label : '기타';
    }

    function examOrder(exam) {
      const idx = EXAMS.indexOf(exam);
      return idx === -1 ? 999 : idx;
    }

    function formatDateText(v) {
      if (!v) return '-';
      if (v && typeof v === 'object' && typeof v.seconds === 'number') {
        const d = new Date((v.seconds * 1000) + Math.floor((v.nanoseconds || 0) / 1000000));
        return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
      }
      const d = new Date(v);
      if (Number.isNaN(d.getTime())) return String(v);
      return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
    }

    function formatScoreDelta(curr, prev) {
      if (!prev) return '신규';
      const diff = Number(curr.score || curr || 0) - Number(prev.score || prev || 0);
      if (diff > 0) return <span className="text-emerald-600 font-bold">+{diff}점 ▲</span>;
      if (diff < 0) return <span className="text-rose-600 font-bold">{diff}점 ▼</span>;
      return <span className="text-slate-500 font-bold">유지</span>;
    }

    function formatTierDelta(curr, prev) {
      if (!prev) return '신규';
      const diff = Number(prev.tier || prev || 0) - Number(curr.tier || curr || 0);
      if (diff > 0) return <span className="text-emerald-600 font-bold">{diff}등급 ▲</span>;
      if (diff < 0) return <span className="text-rose-600 font-bold">{Math.abs(diff)}등급 ▼</span>;
      return <span className="text-slate-500 font-bold">유지</span>;
    }

    function safeLower(v) { return String(v || '').toLowerCase(); }

    function compareStatus(curr, prev) {
      if (!prev) return { score: 'new', tier: 'new' };
      const score = Number(curr.score) > Number(prev.score) ? 'up' : Number(curr.score) < Number(prev.score) ? 'down' : 'same';
      const tier = Number(curr.tier) < Number(prev.tier) ? 'up' : Number(curr.tier) > Number(prev.tier) ? 'down' : 'same';
      return { score, tier };
    }

    function normalizeTeacherAnalysisTier(tier) {
      const n = Number(tier || 0);
      if (!n) return 0;
      return Math.min(n, 5); // 6~9등급은 5등급으로 처리
    }

    function findPreviousComparableRecord(currentRow, allRows) {
      const base = allRows
        .filter((r) => r.studentId === currentRow.studentId && r.subject === currentRow.subject)
        .filter((r) => Number(r.year) < Number(currentRow.year) || (Number(r.year) === Number(currentRow.year) && examOrder(r.exam) < examOrder(currentRow.exam)))
        .sort((a,b) => Number(a.year) - Number(b.year) || examOrder(a.exam) - examOrder(b.exam));
      if (!base.length) return null;
      const currentDetail = String(currentRow.detailSubject || '').trim();
      const sameDetail = currentDetail ? base.filter((r) => String(r.detailSubject || '').trim() === currentDetail) : [];
      if (sameDetail.length) return sameDetail[sameDetail.length - 1];
      const noDetail = base.filter((r) => !String(r.detailSubject || '').trim());
      if (noDetail.length) return noDetail[noDetail.length - 1];
      return base[base.length - 1];
    }

    function containsTestKeyword(value) {
      const v = String(value || '').trim().toLowerCase();
      if (!v) return false;
      return TEST_KEYWORDS.some((keyword) => v.includes(String(keyword).toLowerCase()));
    }

    function isLikelyTestStudent(student) {
      return [
        student?.name,
        student?.school,
        student?.customSchool,
        student?.createdBy,
        student?.updatedBy,
      ].some(containsTestKeyword);
    }

    function isLikelyTestScore(score, linkedStudentIds = new Set()) {
      return linkedStudentIds.has(score?.studentId) || [
        score?.subject,
        score?.detailSubject,
        score?.className,
        score?.createdBy,
        score?.updatedBy,
      ].some(containsTestKeyword);
    }

    function Card({ title, children, right=null, className='' }) {
      return (
        <div className={`card-3d rounded-[28px] p-5 ${className}`}>
          <div className="flex items-center justify-between gap-3 mb-4">
            <h3 className="text-lg font-black tracking-tight text-slate-900">{title}</h3>
            {right}
          </div>
          {children}
        </div>
      );
    }

    function SimpleLineChart({ series }) {
      const width = 460; const height = 180;
      const points = series.map((v, idx) => ({
        x: 24 + (idx * ((width - 48) / Math.max(series.length - 1, 1))),
        y: 18 + ((100 - Math.min(Math.max(Number(v.score || 0), 0), 100)) / 100) * (height - 36),
      }));
      const poly = points.map((p) => `${p.x},${p.y}`).join(' ');
      return (
        <svg viewBox={`0 0 ${width} ${height}`} className="w-full h-[190px]">
          {[20,40,60,80].map((line) => (
            <line key={line} x1="20" y1={18 + ((100-line)/100)*(height-36)} x2={width-20} y2={18 + ((100-line)/100)*(height-36)} stroke="#e5e7eb" strokeDasharray="4 4" />
          ))}
          <polyline fill="none" stroke="#6d28d9" strokeWidth="4" strokeLinecap="round" strokeLinejoin="round" points={poly} />
          {points.map((p, idx) => (
            <g key={idx}>
              <circle cx={p.x} cy={p.y} r="6" fill="#fff" stroke="#6d28d9" strokeWidth="3" />
              <text x={p.x} y={height-8} fontSize="11" textAnchor="middle" fill="#64748b">{series[idx].exam.replace('고사','')}</text>
            </g>
          ))}
        </svg>
      );
    }

    function App() {
      const [db, setDb] = useState(null);
      const [user, setUser] = useState(null);
      const [isLoading, setIsLoading] = useState(true);
      const [initError, setInitError] = useState('');
      
      const [teachersData, setTeachersData] = useState([]);
      const [studentsData, setStudentsData] = useState([]);
      const [scoresData, setScoresData] = useState([]);
      const [teamExamData, setTeamExamData] = useState([]);

      const [selectedTeacherName, setSelectedTeacherName] = useState('');
      const [loginPin, setLoginPin] = useState('');
      const [loginError, setLoginError] = useState('');
      const [isLoggedIn, setIsLoggedIn] = useState(false);
      const [currentTeacher, setCurrentTeacher] = useState(null);
      const [isDeletingTestData, setIsDeletingTestData] = useState(false);
      const [authReady, setAuthReady] = useState(false);
      const [dataReady, setDataReady] = useState(false);

      const [view, setView] = useState('dashboard');
      
      const [filters, setFilters] = useState({ year: 2026, exam: EXAMS[0], school: '전체', grade: '전체', className: '전체' });
      const [activeSubject, setActiveSubject] = useState('전체');
      const [dashboardSort, setDashboardSort] = useState({ key: 'score', direction: 'desc' });

      const [manageTeacherFilter, setManageTeacherFilter] = useState('전체');
      const [selectedQuickStudentId, setSelectedQuickStudentId] = useState('');
      const [manageStudent, setManageStudent] = useState({ year: 2026, name: '', school: '', customSchool: '', grade: 1 });
      const [modal, setModal] = useState({ isOpen: false, mode: 'add' });
      const [modalForm, setModalForm] = useState({ docId: null, exam: '', subject: '', detailSubject: '', score: '', tier: '', className: '' });
      const [quickEntryExamMap, setQuickEntryExamMap] = useState({});

      const [teacherAnalysisTeacher, setTeacherAnalysisTeacher] = useState('');
      const [teacherAnalysisView, setTeacherAnalysisView] = useState({ year: 2026, exam: EXAMS[0] });
      const [teacherAnalysisSort, setTeacherAnalysisSort] = useState({ key: 'name', direction: 'asc' });

      const [schoolView, setSchoolView] = useState({ year: 2026, exam: EXAMS[0], school: '전체', grade: '전체', subject: '전체' });
      const [subjectView, setSubjectView] = useState({ year: 2026, exam: EXAMS[0], subject: '수학', detailSubject: '전체' });
      const [subjectSort, setSubjectSort] = useState({ key: 'score', direction: 'desc' });
      
      const [studentAnalysisStudentId, setStudentAnalysisStudentId] = useState('');
      const [teamExamForm, setTeamExamForm] = useState({ year: 2026, exam: EXAMS[0], school: '', grade: 1, subject: '국어', detailSubject: '', objectiveCount: '', objectivePoints: '', subjectiveCount: '', subjectivePoints: '', difficulty: 3, review: '', specialNote: '' });

      const getPath = (name) => typeof __app_id !== 'undefined' ? `artifacts/${__app_id}/public/data/${name}` : `openacademy/data/${name}`;

      useEffect(() => {
        const initFirebase = async () => {
          try {
            let attempts = 0;
            while (!window.FirebaseAPI && attempts < 80) {
              await new Promise((r) => setTimeout(r, 100));
              attempts++;
            }
            if (!window.FirebaseAPI) throw new Error('Firebase 모듈을 불러오지 못했습니다.');

            const hasInjectedConfig = typeof __firebase_config !== 'undefined' && __firebase_config;
            const firebaseConfig = hasInjectedConfig ? JSON.parse(__firebase_config) : {
  apiKey: "AIzaSyCAT_dBqH8QHwJG-E1vNkWlBiyzRx8y-Ac",
  authDomain: "open-school-3f74c.firebaseapp.com",
  projectId: "open-school-3f74c",
  storageBucket: "open-school-3f74c.firebasestorage.app",
  messagingSenderId: "623260231783",
  appId: "1:623260231783:web:33dded88508aa05d498cc2",
            };

            const values = Object.values(firebaseConfig || {});
            if (!hasInjectedConfig && values.some((v) => String(v || '').startsWith('YOUR_'))) {
              throw new Error('Firebase 6종 키가 비어 있습니다. index.html 안 firebaseConfig 자리에 실제 값을 넣어주세요.');
            }

            const app = !window.FirebaseAPI.getApps().length ? window.FirebaseAPI.initializeApp(firebaseConfig) : window.FirebaseAPI.getApp();
            const auth = window.FirebaseAPI.getAuth(app);
            const firestore = window.FirebaseAPI.getFirestore(app);
            setDb(firestore);

            await new Promise(async (resolve, reject) => {
              const timeoutId = setTimeout(() => reject(new Error('Firebase 인증 대기 시간이 초과되었습니다.')), 12000);
              const unsubscribe = window.FirebaseAPI.onAuthStateChanged(auth, async (u) => {
                clearTimeout(timeoutId);
                unsubscribe();
                setUser(u || null);
                setAuthReady(true);
                resolve();
              }, (error) => {
                clearTimeout(timeoutId);
                reject(error);
              });

              try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                  await window.FirebaseAPI.signInWithCustomToken(auth, __initial_auth_token);
                } else {
                  await window.FirebaseAPI.signInAnonymously(auth);
                }
              } catch (authError) {
                clearTimeout(timeoutId);
                unsubscribe();
                reject(authError);
              }
            });
          } catch (error) {
            setInitError('Firebase 초기화 실패: ' + error.message);
            setIsLoading(false);
          }
        };
        initFirebase();
      }, []);

      useEffect(() => {
        if (!db || !window.FirebaseAPI || !authReady || !user) return;
        const { collection, onSnapshot } = window.FirebaseAPI;
        let unsubs = [];
        const ready = { teachers: false, students: false, scores: false, team: false };
        const markReady = (key) => {
          ready[key] = true;
          if (Object.values(ready).every(Boolean)) {
            setDataReady(true);
            setIsLoading(false);
          }
        };

        try {
          unsubs.push(onSnapshot(collection(db, getPath('teachers')), (s) => {
            setTeachersData(s.docs.map(d => ({ teacherId: d.id, ...d.data() })).filter(t => t.isActive !== false));
            markReady('teachers');
          }, (error) => { setInitError('teachers 데이터를 읽을 수 없습니다: ' + error.message); setIsLoading(false); }));
          unsubs.push(onSnapshot(collection(db, getPath('students')), (s) => {
            setStudentsData(s.docs.map(d => ({ studentId: d.id, ...d.data() })));
            markReady('students');
          }, (error) => { setInitError('students 데이터를 읽을 수 없습니다: ' + error.message); setIsLoading(false); }));
          unsubs.push(onSnapshot(collection(db, getPath('scores')), (s) => {
            setScoresData(s.docs.map(d => ({ docId: d.id, ...d.data() })));
            markReady('scores');
          }, (error) => { setInitError('scores 데이터를 읽을 수 없습니다: ' + error.message); setIsLoading(false); }));
          unsubs.push(onSnapshot(collection(db, getPath('teamExams')), (s) => {
            setTeamExamData(s.docs.map(d => ({ docId: d.id, ...d.data() })).filter(t => !t.deleted));
            markReady('team');
          }, () => markReady('team')));
        } catch (error) {
          setInitError('데이터베이스 연결 실패: ' + error.message);
          setIsLoading(false);
        }
        return () => unsubs.forEach(u => u && u());
      }, [db, authReady, user]);

      const joinedData = useMemo(() => scoresData.filter(s => !s.deleted).map(score => {
        const student = studentsData.find(s => s.studentId === score.studentId && !s.deleted) || {};
        return { ...score, name: student.name || '알수없음', school: student.school || '-', grade: student.grade || 0, year: student.year || score.year, isWithdrawn: student.isWithdrawn === true };
      }), [scoresData, studentsData]);

      const activeJoinedData = useMemo(() => joinedData.filter(row => !row.isWithdrawn), [joinedData]);
      const schools = useMemo(() => ['전체', ...SCHOOL_OPTIONS, '직접입력'], []);
      const classNames = useMemo(() => ['전체', ...Array.from(new Set(scoresData.filter(d => !d.deleted).map(d => d.className).filter(Boolean))).sort()], [scoresData]);
      const activeStudents = useMemo(() => studentsData.filter(s => !s.deleted && !s.isWithdrawn).sort((a,b)=>String(a.name||'').localeCompare(String(b.name||''))), [studentsData]);
      const isAdminUser = currentTeacher?.name === ADMIN_TEACHER_NAME;

      const detectedTestStudents = useMemo(() => {
        return studentsData.filter((student) => !student.deleted && isLikelyTestStudent(student));
      }, [studentsData]);

      const detectedTestStudentIds = useMemo(() => new Set(detectedTestStudents.map((student) => student.studentId)), [detectedTestStudents]);

      const detectedTestScores = useMemo(() => {
        return scoresData.filter((score) => !score.deleted && isLikelyTestScore(score, detectedTestStudentIds));
      }, [scoresData, detectedTestStudentIds]);

      const handleDeleteTestData = async () => {
        if (!db || !window.FirebaseAPI) return;
        const studentTargets = detectedTestStudents;
        const scoreTargets = detectedTestScores;
        if (!studentTargets.length && !scoreTargets.length) {
          alert('삭제할 테스트 데이터가 없습니다.');
          return;
        }
        const confirmMessage = `테스트 학생 ${studentTargets.length}명, 테스트 성적 ${scoreTargets.length}건을 Firebase에서 실제 삭제할까요?\n삭제 후 복구되지 않습니다.`;
        if (!window.confirm(confirmMessage)) return;

        try {
          setIsDeletingTestData(true);
          const { writeBatch, doc } = window.FirebaseAPI;
          const refs = [
            ...studentTargets.map((student) => ({ path: getPath('students'), id: student.studentId })),
            ...scoreTargets.map((score) => ({ path: getPath('scores'), id: score.docId })),
          ];

          for (let i = 0; i < refs.length; i += 450) {
            const batch = writeBatch(db);
            refs.slice(i, i + 450).forEach((item) => {
              batch.delete(doc(db, item.path, item.id));
            });
            await batch.commit();
          }

          alert(`테스트 학생 ${studentTargets.length}명 / 테스트 성적 ${scoreTargets.length}건이 삭제되었습니다.`);
        } catch (error) {
          alert('테스트 데이터 삭제 중 오류가 발생했습니다: ' + error.message);
        } finally {
          setIsDeletingTestData(false);
        }
      };

      const handleLogin = (e) => {
        e.preventDefault();
        if (!selectedTeacherName) return setLoginError('선생님을 선택해주세요.');
        const t = teachersData.find(t => t.name === selectedTeacherName && String(t.pin||'') === loginPin);
        if (!t) return setLoginError('PIN이 올바르지 않습니다.');
        setCurrentTeacher(t);
        setIsLoggedIn(true); setLoginError('');
      };

      // Handle Manage Form
      const handleManageStudentChange = (e) => {
        const { name, value } = e.target;
        if(name === 'school' && value !== '직접입력') {
           setManageStudent(p => ({ ...p, school: value, customSchool: '' }));
        } else {
           setManageStudent(p => ({ ...p, [name]: (name==='year'||name==='grade')?Number(value):value }));
        }
      };

      const finalSchoolValue = manageStudent.school === '직접입력' ? manageStudent.customSchool : manageStudent.school;

      const openScoreModal = (exam, subject, record = null) => {
        if (!manageStudent.name || !finalSchoolValue) return alert('상단에서 학생명과 학교를 정확히 입력해주세요.');
        const lastClass = joinedData.find(d => d.name === manageStudent.name && d.subject === subject)?.className || '';
        if (record) {
          setModalForm(record); setModal({ isOpen: true, mode: 'edit' });
        } else {
          setModalForm({ docId: null, exam, subject, detailSubject: '', score: '', tier: '', className: lastClass });
          setModal({ isOpen: true, mode: 'add' });
        }
      };

      const handleModalSubmit = async (e) => {
        e.preventDefault();
        if (!db) return;
        try {
          const { addDoc, updateDoc, doc, collection, query, where, getDocs } = window.FirebaseAPI;
          let targetStudentId = null;
          const q = query(collection(db, getPath('students')), where('name', '==', manageStudent.name), where('year', '==', manageStudent.year));
          const snap = await getDocs(q);
          
          if (!snap.empty) {
            targetStudentId = snap.docs[0].id;
            await updateDoc(doc(db, getPath('students'), targetStudentId), { school: finalSchoolValue, grade: manageStudent.grade, updatedAt: new Date().toISOString(), deleted: false });
          } else {
            const docRef = await addDoc(collection(db, getPath('students')), { name: manageStudent.name, year: manageStudent.year, school: finalSchoolValue, grade: manageStudent.grade, createdAt: new Date().toISOString(), deleted: false });
            targetStudentId = docRef.id;
          }

          let safeTier = Number(modalForm.tier);
          if (safeTier >= 6 && safeTier <= 9) safeTier = 5; // 6~9등급 자동 5등급 처리

          const scoreData = { studentId: targetStudentId, year: manageStudent.year, exam: modalForm.exam, subject: modalForm.subject, detailSubject: modalForm.detailSubject, score: Number(modalForm.score), tier: safeTier, className: modalForm.className, updatedAt: new Date().toISOString(), updatedBy: currentTeacher?.name, deleted: false };
          
          if (modal.mode === 'edit') {
            await updateDoc(doc(db, getPath('scores'), modalForm.docId), scoreData);
          } else {
            await addDoc(collection(db, getPath('scores')), { ...scoreData, createdAt: new Date().toISOString(), createdBy: currentTeacher?.name });
          }
          setModal({ isOpen: false, mode: 'add' });
        } catch (err) { alert('저장 오류: ' + err.message); }
      };

      // Excel Upload Handler: 학생 기본정보만 등록하고, 선생님 소유는 붙이지 않음
      const handleExcelUpload = (e) => {
        const file = e.target.files[0];
        if (!file || !db) return;
        const reader = new FileReader();
        reader.onload = async (evt) => {
          try {
            const data = evt.target.result;
            const workbook = XLSX.read(data, { type: 'binary' });
            const sheet = workbook.Sheets[workbook.SheetNames[0]];
            const json = XLSX.utils.sheet_to_json(sheet, { defval: '' });

            const { addDoc, collection, query, where, getDocs, updateDoc, doc } = window.FirebaseAPI;
            let successCount = 0;
            let skipCount = 0;

            for (const row of json) {
              const name = String(row['학생명'] || '').trim();
              const school = String(row['학교'] || '').trim();
              const grade = Number(row['학년']);
              const year = Number(row['연도'] || 2026);

              if (!name || !school || !grade || !year) {
                skipCount++;
                continue;
              }

              const q = query(collection(db, getPath('students')), where('name', '==', name), where('year', '==', year));
              const snap = await getDocs(q);
              if (!snap.empty) {
                const studentId = snap.docs[0].id;
                await updateDoc(doc(db, getPath('students'), studentId), {
                  school,
                  grade,
                  updatedAt: new Date().toISOString(),
                  deleted: false,
                });
              } else {
                await addDoc(collection(db, getPath('students')), {
                  name,
                  year,
                  school,
                  grade,
                  createdAt: new Date().toISOString(),
                  updatedAt: new Date().toISOString(),
                  deleted: false,
                });
              }
              successCount++;
            }
            alert(`학생 기본정보 ${successCount}건 업로드 완료${skipCount ? ` / 건너뜀 ${skipCount}건` : ''}`);
            e.target.value = '';
          } catch(err) { alert('엑셀 처리 중 오류: ' + err.message); }
        };
        reader.readAsBinaryString(file);
      };


      if (isLoading) return <div className="min-h-screen flex items-center justify-center text-violet-700 font-bold text-xl">연결 준비 중...</div>;
      if (initError) return <div className="min-h-screen flex items-center justify-center p-6"><div className="bg-white border border-rose-200 rounded-[28px] p-6 max-w-2xl w-full"><div className="text-2xl font-black text-rose-600 mb-3">연결 오류</div><div className="text-sm text-rose-600 whitespace-pre-wrap leading-7">{initError}</div></div></div>;
      
      if (!isLoggedIn) {
        return (
          <div className="min-h-screen app-shell flex items-center justify-center p-4">
            <div className="w-full max-w-5xl grid md:grid-cols-[1.1fr_0.9fr] gap-6">
              <div className="hidden md:flex rounded-[36px] hero-panel p-10 flex-col justify-end relative overflow-hidden">
                <div className="absolute inset-0 bg-[radial-gradient(circle_at_top_left,rgba(124,58,237,0.18),transparent_28%)]"></div>
                <div className="relative z-10">
                  <h1 className="login-main-title text-[34px] md:text-[42px] text-slate-900"><span className="block">열린학원</span><span className="mt-2 block">성적분석 포털사이트</span></h1>
                  <p className="login-copy-title mt-8 text-[26px] md:text-[34px] leading-[1.7] text-slate-800">입력은 쉽고 빠르게,<br/>분석은 깊이 있게!!!</p>
                  <div className="creator-signature mt-12 text-[14px]">Created by mOOn_Mathematics</div>
                </div>
              </div>
              <div className="glass rounded-[36px] panel-shadow soft-border p-8">
                <h2 className="text-3xl font-black text-slate-900 mb-2">빠른 PIN 로그인</h2>
                <p className="text-slate-500 mb-8">선생님을 선택하고 4자리 PIN을 입력하세요.</p>
                <form onSubmit={handleLogin} className="space-y-6">
                  <div>
                    <label className="block text-sm font-bold text-slate-700 mb-3">선생님 선택</label>
                    <div className="grid grid-cols-3 gap-3">
                      {teachersData.map((t, idx) => (
                        <button type="button" key={t.teacherId} onClick={() => setSelectedTeacherName(t.name)} className={`teacher-chip teacher-chip-${(idx % 6) + 1} ${selectedTeacherName === t.name ? 'teacher-chip-selected' : ''}`}>
                          {t.name}
                        </button>
                      ))}
                    </div>
                  </div>
                  <div>
                    <label className="block text-sm font-bold text-slate-700 mb-2">PIN 번호</label>
                    <input type="password" maxLength="4" value={loginPin} onChange={e => setLoginPin(e.target.value.replace(/\D/g, ''))} className="w-full h-16 border-2 border-slate-200 rounded-2xl text-center text-3xl tracking-[1em] font-black focus:border-violet-400 outline-none" placeholder="••••" />
                  </div>
                  {loginError && <div className="text-rose-600 text-sm font-bold">{loginError}</div>}
                  <button type="submit" className="w-full h-14 rounded-2xl bg-gradient-to-r from-violet-700 to-indigo-600 text-white font-bold text-lg shadow-lg">로그인</button>
                </form>
              </div>
            </div>
          </div>
        );
      }

      // Views Data Prep
      const filteredDashboardData = activeJoinedData.filter(d => d.year === filters.year && d.exam === filters.exam && (filters.school==='전체'||d.school===filters.school) && (filters.grade==='전체'||d.grade===filters.grade) && (filters.className==='전체'||d.className===filters.className) && (activeSubject==='전체'||d.subject===activeSubject));
      const sortedDashboardData = [...filteredDashboardData].sort((a,b) => dashboardSort.direction === 'asc' ? String(a[dashboardSort.key]).localeCompare(String(b[dashboardSort.key])) : String(b[dashboardSort.key]).localeCompare(String(a[dashboardSort.key])));

      // Teacher Analysis Logic
      const teacherAnalysisRows = useMemo(() => {
        const target = teacherAnalysisTeacher || currentTeacher.name;
        const rows = activeJoinedData.filter(r => (r.createdBy===target || r.updatedBy===target) && r.year===teacherAnalysisView.year && r.exam===teacherAnalysisView.exam);
        const map = new Map();
        rows.forEach(r => {
          if(!map.has(r.studentId)) map.set(r.studentId, { ...r, scores: [] });
          const prev = findPreviousComparableRecord(r, activeJoinedData);
          map.get(r.studentId).scores.push({ ...r, prev, scoreDelta: r.score - (prev?.score||0), tierDelta: (prev?.tier||0) - r.tier });
        });
        return Array.from(map.values()).map(s => ({
          ...s,
          subjectNames: s.scores.map(x=>x.subject).join(', '),
          average: s.scores.length ? Math.round(s.scores.reduce((a,b)=>a+b.score,0)/s.scores.length) : 0,
          scoreImproved: s.scores.some(x=>x.scoreDelta > 0),
          tierImproved: s.scores.some(x=>x.tierDelta > 0)
        }));
      }, [activeJoinedData, teacherAnalysisTeacher, teacherAnalysisView, currentTeacher]);
      const sortedTeacherAnalysisRows = useMemo(() => {
        const getValue = (row, key) => {
          if (key === 'name') return safeLower(row.name);
          if (key === 'school') return safeLower(row.school);
          if (key === 'grade') return Number(row.grade || 0);
          if (key === 'subjectNames') return safeLower(row.subjectNames || '');
          if (key === 'exam') return examOrder(row.scores?.[0]?.exam || '');
          if (key === 'score') return Number(row.average || 0);
          if (key === 'tier') return Number(Math.min(...(row.scores || []).map((s) => Number(s.tier || 5))) || 0);
          if (key === 'bestDelta') return Number(Math.max(...(row.scores || []).map((s) => (Number(s.score || 0) - Number(s.prev?.score || 0)))) || 0);
          return '';
        };
        const items = [...teacherAnalysisRows];
        items.sort((a, b) => {
          const av = getValue(a, teacherAnalysisSort.key);
          const bv = getValue(b, teacherAnalysisSort.key);
          if (av < bv) return teacherAnalysisSort.direction === 'asc' ? -1 : 1;
          if (av > bv) return teacherAnalysisSort.direction === 'asc' ? 1 : -1;
          return 0;
        });
        return items;
      }, [teacherAnalysisRows, teacherAnalysisSort]);

      
      const teacherManagedStudents = useMemo(() => {
        const target = manageTeacherFilter;
        const rows = target === '전체' ? activeJoinedData : activeJoinedData.filter(r => r.createdBy===target || r.updatedBy===target);
        const map = new Map();
        rows.forEach(r => {
          if(!map.has(r.studentId)) map.set(r.studentId, { id: r.studentId, name: r.name, school: r.school, grade: r.grade, year: r.year });
        });
        return Array.from(map.values());
      }, [activeJoinedData, manageTeacherFilter]);

      const titleMap = Object.fromEntries(MENU_ITEMS.map((item) => [item.key, item.label]));
      const adminPill = isAdminUser ? <span className="admin-badge px-3 py-1.5 text-xs">관리자</span> : null;
      const topContextBar = (() => {
        if (view === 'dashboard') {
          return <div className="top-context-wrap hidden xl:flex flex-wrap gap-2 items-center px-3 py-3 max-w-full overflow-x-auto no-scrollbar">{EXAMS.map((exam) => <button key={exam} type="button" onClick={() => setFilters((p) => ({ ...p, exam }))} className={`top-context-chip ${filters.exam === exam ? 'top-context-chip-active' : ''}`}>{EXAM_SHORT_LABELS[exam]}</button>)}</div>;
        }
        if (view === 'manage') {
          return <div className="top-context-wrap hidden xl:flex flex-wrap gap-2 items-center px-3 py-3 max-w-full overflow-x-auto no-scrollbar"><span className="px-2 text-xs font-bold text-slate-400 whitespace-nowrap">선생님 빠른 선택</span><button type="button" onClick={() => setManageTeacherFilter('전체')} className={`top-context-chip ${manageTeacherFilter === '전체' ? 'top-context-chip-active' : ''}`}>전체</button>{teachersData.map((teacher, idx) => <button key={teacher.teacherId} type="button" onClick={() => setManageTeacherFilter(teacher.name)} className={`teacher-chip teacher-chip-${(idx % 6) + 1} h-11 px-5 ${manageTeacherFilter === teacher.name ? 'teacher-chip-selected' : ''}`}>{teacher.name}</button>)}</div>;
        }
        if (view === 'teacherAnalysis') {
          const activeTeacher = teacherAnalysisTeacher || currentTeacher?.name || '';
          return <div className="top-context-wrap hidden xl:flex flex-wrap gap-2 items-center px-3 py-3 max-w-full overflow-x-auto no-scrollbar">{teachersData.map((teacher, idx) => <button key={teacher.teacherId} type="button" onClick={() => setTeacherAnalysisTeacher(teacher.name)} className={`teacher-chip teacher-chip-${(idx % 6) + 1} h-11 px-5 ${activeTeacher === teacher.name ? 'teacher-chip-selected' : ''}`}>{teacher.name}</button>)}</div>;
        }
        if (view === 'schoolAnalysis') {
          return <div className="top-context-wrap hidden xl:flex flex-wrap gap-2 items-center px-3 py-3 max-w-full overflow-x-auto no-scrollbar"><button type="button" onClick={() => setSchoolView((p) => ({ ...p, school: '전체' }))} className={`top-context-chip ${schoolView.school === '전체' ? 'top-context-chip-active' : ''}`}>전체 학교</button>{SCHOOL_OPTIONS.map((school) => <button key={school} type="button" onClick={() => setSchoolView((p) => ({ ...p, school }))} className={`top-context-chip ${schoolView.school === school ? 'top-context-chip-active' : ''}`}>{school}</button>)}</div>;
        }
        if (view === 'subjectAnalysis') {
          return <div className="top-context-wrap hidden xl:flex flex-wrap gap-2 items-center px-3 py-3 max-w-full overflow-x-auto no-scrollbar">{SUBJECTS.map((subject) => <button key={subject} type="button" onClick={() => setSubjectView((p) => ({ ...p, subject }))} className={`top-context-chip ${subjectView.subject === subject ? 'top-context-chip-active' : ''}`}>{subject}</button>)}</div>;
        }
        return null;
      })();

      return (
        <div className="app-shell font-sans text-slate-800">
          <aside className="desktop-sidebar hidden xl:flex fixed left-5 top-5 bottom-5 w-[260px] rounded-[30px] glass soft-border sidebar-shadow p-5 flex-col">
            <div className="flex items-center justify-center font-black text-2xl text-violet-800 tracking-tight pb-6 border-b border-slate-100">열린학원</div>
            <div className="mt-6 space-y-2 flex-1">
              {MENU_ITEMS.map(i => (
                <button key={i.key} onClick={() => setView(i.key)} className={`w-full flex items-center gap-3 px-4 py-3 font-bold text-sm ${view === i.key ? 'nav-pill-active' : 'nav-pill'}`}>
                  <i className={`fas ${i.icon} w-5`}></i>{i.label}
                </button>
              ))}
            </div>
            <div className="bg-slate-50 p-4 rounded-2xl border border-slate-200">
              <div className="text-xs text-slate-500 font-bold mb-1">로그인</div>
              <div className="flex items-center justify-between gap-2"><div className="font-black text-slate-900">{currentTeacher.name} 선생님</div>{adminPill}</div>
            </div>
          </aside>

          <main className="content-wrap xl:pl-[290px] p-4 sm:p-6 space-y-6 mobile-safe-bottom">
            <header className="sticky top-0 z-20 bg-white/95 border-b border-slate-200/75 rounded-[28px] p-4 sm:p-5 shadow-sm">
              <div className="flex items-start justify-between gap-3">
                <div>
                  <div className="text-sm font-bold text-violet-700">열린학원 성적분석 포털</div>
                  <h2 className="mt-1 text-2xl sm:text-3xl font-black text-slate-900">{titleMap[view]}</h2>
                </div>
                <div className="flex items-center gap-2">
                  {isAdminUser ? <span className="admin-badge px-3 py-2 text-xs hidden sm:inline-flex">수최 관리자</span> : null}
                  <button onClick={() => window.print()} className="px-4 py-2 bg-slate-100 rounded-full font-bold text-sm text-slate-700 hover:bg-slate-200"><i className="fas fa-print mr-2"></i>인쇄</button>
                </div>
              </div>
              <div className="mt-4">{topContextBar}</div>
              <div className="xl:hidden mt-4 top-nav-scroll">
                <div className="flex gap-2 min-w-max pb-1">
                  {MENU_ITEMS.map((item) => (

                          rows.forEach(r => {

                  {(() => {
                    const target = activeStudents.find((student) => student.studentId === studentAnalysisStudentId);
                    if (!target) return <div className="py-10 text-center text-slate-400">학생을 먼저 선택해주세요.</div>;
                    const records = activeJoinedData.filter((row) => row.studentId === target.studentId).sort((a, b) => Number(a.year) - Number(b.year) || examOrder(a.exam) - examOrder(b.exam));
                    return (
                      <div className="space-y-5">
                        <div className="text-lg font-black text-slate-900">{target.name} · {target.school} · {target.grade}학년</div>
                        <SimpleLineChart series={records} />
                        <div className="overflow-x-auto mini-scroll">
                          <table className="w-full text-sm text-center">
                            <thead className="bg-slate-50 text-slate-500 text-xs uppercase font-bold border-b"><tr><th className="py-3">연도</th><th>시험</th><th>과목</th><th>점수</th><th>등급</th><th>입력자</th></tr></thead>
                            <tbody className="divide-y divide-slate-100">
                              {records.map((r) => <tr key={r.docId}><td className="py-3">{r.year}</td><td>{EXAM_SHORT_LABELS[r.exam] || r.exam}</td><td>{r.subject}</td><td className="font-black text-violet-700">{r.score}점</td><td>{normalizeTeacherAnalysisTier(r.tier)}등급</td><td>{r.updatedBy || r.createdBy || '-'}</td></tr>)}
                            </tbody>
                          </table>
                        </div>
                      </div>
                    );
                  })()}
                </Card>
              </div>
            )}

            {view === 'teamExam' && (
              <div className="space-y-6">
                <Card title="시험 분석 아카이브">
                  <div className="overflow-x-auto mini-scroll">
                    <table className="w-full text-sm text-center">
                      <thead className="bg-slate-50 text-slate-500 text-xs uppercase font-bold border-b"><tr><th className="py-3">연도</th><th>시험</th><th>학교</th><th>학년</th><th>과목</th><th>난이도</th><th>작성자</th></tr></thead>
                      <tbody className="divide-y divide-slate-100">
                        {teamExamData.length ? teamExamData.map((item) => <tr key={item.docId}><td className="py-3">{item.year}</td><td>{EXAM_SHORT_LABELS[item.exam] || item.exam}</td><td>{item.school || '-'}</td><td>{item.grade ? `${item.grade}학년` : '-'}</td><td>{item.subject}{item.detailSubject ? ` (${item.detailSubject})` : ''}</td><td>{item.difficulty || '-'}</td><td>{item.updatedBy || item.createdBy || '-'}</td></tr>) : <tr><td colSpan="7" className="py-10 text-slate-400">저장된 시험 분석이 없습니다.</td></tr>}
                      </tbody>
                    </table>
                  </div>
                </Card>
              </div>
            )}

          </main>

          {/* Modal */}
          {modal.isOpen && (
            <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/50 p-4">
              <div className="bg-white rounded-[24px] w-full max-w-sm overflow-hidden shadow-2xl">
                <div className="bg-violet-700 p-4 text-white font-black flex justify-between">
                  <span>{modalForm.exam} {modalForm.subject} 입력</span>
                  <button onClick={()=>setModal({isOpen:false})}><i className="fas fa-times"></i></button>
                </div>
                <form onSubmit={handleModalSubmit} className="p-6 space-y-4">
                  <div>
                    <label className="block text-sm font-bold text-slate-700 mb-1">세부과목</label>
                    <input type="text" value={modalForm.detailSubject} onChange={e=>setModalForm({...modalForm, detailSubject: e.target.value})} className="w-full border p-2.5 rounded-xl outline-none focus:border-violet-500" placeholder="예: 기하, 공통수학" />
                  </div>
                  <div className="flex gap-4">
                    <div className="flex-1">
                      <label className="block text-sm font-bold text-slate-700 mb-1">원점수</label>
                      <input type="number" required min="0" max="100" value={modalForm.score} onChange={e=>setModalForm({...modalForm, score: e.target.value})} className="w-full border-2 border-slate-200 bg-slate-50 p-3 rounded-xl text-center text-xl font-black outline-none focus:border-violet-500" />
                    </div>
                    <div className="flex-1">
                      <label className="block text-sm font-bold text-violet-700 mb-1">등급</label>
                      <input type="number" required min="1" max="9" value={modalForm.tier} onChange={e=>setModalForm({...modalForm, tier: e.target.value})} className="w-full border-2 border-violet-200 bg-violet-50 p-3 rounded-xl text-center text-xl font-black text-violet-700 outline-none focus:border-violet-500" />
                      <div className="text-[10px] text-violet-500 mt-1 text-center font-bold">※ 6~9등급은 5등급 자동처리</div>
                    </div>
                  </div>
                  <button type="submit" className="w-full bg-violet-700 text-white font-black py-3 rounded-xl mt-4">저장하기</button>
                </form>
              </div>
            </div>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
