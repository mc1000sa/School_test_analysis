<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>열린학원 성적분석 시스템 (클라우드 저장)</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- FontAwesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <!-- React & ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

  <!-- Babel -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- 🔥 Firebase 모듈 사전 로드 (Babel 에러 완벽 차단 및 먹통 방지) 🔥 -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, collection, onSnapshot, addDoc, updateDoc, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    // 리액트에서 편하게 꺼내 쓸 수 있도록 전역 저장소에 세팅합니다.
    window.FirebaseAPI = {
      initializeApp, getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged,
      getFirestore, collection, onSnapshot, addDoc, updateDoc, doc, deleteDoc
    };
  </script>
</head>
<body class="bg-slate-50">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useMemo, useEffect } = React;

    // --- 설정 데이터 ---
    const EXAMS = ['1학기 중간고사', '1학기 기말고사', '2학기 중간고사', '2학기 기말고사'];
    const SUBJECTS = ['국어', '영어', '수학', '과학'];
    const GRADES = [1, 2, 3];
    const YEARS = [2026, 2027, 2028];

    const SUBJECT_COLORS = {
      '전체': 'bg-slate-100 text-slate-700 hover:bg-slate-200 border-slate-300',
      '국어': 'bg-pink-100 text-pink-700 hover:bg-pink-200 border-pink-300',
      '영어': 'bg-orange-100 text-orange-700 hover:bg-orange-200 border-orange-300',
      '수학': 'bg-blue-100 text-blue-700 hover:bg-blue-200 border-blue-300',
      '과학': 'bg-emerald-100 text-emerald-700 hover:bg-emerald-200 border-emerald-300',
    };

    function OpenAcademyAnalysis() {
      // --- 클라우드(Firebase) 상태 ---
      const [db, setDb] = useState(null);
      const [user, setUser] = useState(null);
      const [isLoading, setIsLoading] = useState(true);
      const [initError, setInitError] = useState('');
      const [data, setData] = useState([]);

      // --- 화면 뷰 상태 ---
      const [view, setView] = useState('dashboard'); // 'dashboard' or 'manage'
      const [logoError, setLogoError] = useState(false);
      
      // --- 대시보드 전용 상태 ---
      const [filters, setFilters] = useState({
        year: 2026, exam: '1학기 중간고사', school: '전체', grade: '전체', className: '전체',
      });
      const [activeSubject, setActiveSubject] = useState('전체');
      const [dashboardSort, setDashboardSort] = useState({ key: 'score', direction: 'desc' });

      // --- 🎯 [신규] 엑셀형 입력(Manage) 전용 상태 ---
      const [manageStudent, setManageStudent] = useState({
        year: 2026, name: '', school: '', grade: 1
      });
      
      // 성적 입력/수정 모달창 상태
      const [modal, setModal] = useState({ isOpen: false, mode: 'add' }); // mode: 'add' | 'edit'
      const [modalForm, setModalForm] = useState({
        docId: null, exam: '', subject: '', detailSubject: '', score: '', tier: '', className: ''
      });

      // 1. Firebase 초기 세팅 (가장 안전한 방식 적용)
      useEffect(() => {
        const initFirebase = async () => {
          try {
            // Firebase 모듈이 준비될 때까지 기다림 (최대 5초)
            let attempts = 0;
            while (!window.FirebaseAPI && attempts < 50) {
               await new Promise(r => setTimeout(r, 100));
               attempts++;
            }

            if (!window.FirebaseAPI) {
               throw new Error("인터넷 연결이 불안정하거나 보안 설정에 의해 클라우드 로딩이 지연되고 있습니다.");
            }

            const { initializeApp, getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged, getFirestore } = window.FirebaseAPI;

            let firebaseConfig;
            if (typeof __firebase_config !== 'undefined') {
              firebaseConfig = JSON.parse(__firebase_config);
            } else {
              firebaseConfig = {
                apiKey: "AIzaSyCAT_dBqH8QHwJG-E1vNkWlBiyzRx8y-Ac",
                authDomain: "open-school-3f74c.firebaseapp.com",
                projectId: "open-school-3f74c"
              };
            }

            const app = initializeApp(firebaseConfig);
            const auth = getAuth(app);
            const database = getFirestore(app);
            setDb(database);

            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
              await signInWithCustomToken(auth, __initial_auth_token);
            } else {
              await signInAnonymously(auth);
            }

            onAuthStateChanged(auth, (u) => { setUser(u); });
          } catch (error) {
            setInitError(error.message); setIsLoading(false);
          }
        };
        initFirebase();
      }, []);

      // 2. 데이터 불러오기
      useEffect(() => {
        if (!user || !db || !window.FirebaseAPI) return;
        let unsubscribe;
        const fetchData = async () => {
           try {
             const { collection, onSnapshot } = window.FirebaseAPI;
             const colPath = typeof __app_id !== 'undefined' ? `artifacts/${__app_id}/public/data/scores` : `openacademy/data/scores`;
             const q = collection(db, colPath);
             
             unsubscribe = onSnapshot(q, (snapshot) => {
               const items = [];
               snapshot.forEach(doc => { items.push({ docId: doc.id, ...doc.data() }); });
               setData(items);
               setIsLoading(false);
             }, (error) => {
               setInitError("데이터를 읽을 수 없습니다: " + error.message); setIsLoading(false);
             });
           } catch(error) { setInitError(error.message); setIsLoading(false); }
        };
        fetchData();
        return () => { if(unsubscribe) unsubscribe(); };
      }, [user, db]);

      // --- 데이터 추출 및 필터링 ---
      const schools = ['전체', ...Array.from(new Set(data.map(d => d.school)))];
      const classNames = ['전체', ...Array.from(new Set(data.map(d => d.className).filter(Boolean)))]; 
      const uniqueStudentNames = Array.from(new Set(data.filter(d => d.year === manageStudent.year).map(d => d.name)));

      const resetFilters = () => {
        setFilters({ year: 2026, exam: '1학기 중간고사', school: '전체', grade: '전체', className: '전체' });
        setActiveSubject('전체');
      };

      const filteredDashboardData = useMemo(() => {
        return data.filter(item => {
          return (
            item.year === filters.year &&
            item.exam === filters.exam &&
            (filters.school === '전체' || item.school === filters.school) &&
            (filters.grade === '전체' || item.grade === Number(filters.grade)) &&
            (filters.className === '전체' || item.className === filters.className) &&
            (activeSubject === '전체' || item.subject === activeSubject)
          );
        });
      }, [data, filters, activeSubject]);

      const sortedDashboardData = useMemo(() => {
        let sortableItems = [...filteredDashboardData];
        if (dashboardSort.key !== null) {
          sortableItems.sort((a, b) => {
            let aValue = a[dashboardSort.key]; let bValue = b[dashboardSort.key];
            if (typeof aValue === 'string') { aValue = aValue.toLowerCase(); bValue = bValue.toLowerCase(); }
            if (aValue < bValue) return dashboardSort.direction === 'asc' ? -1 : 1;
            if (aValue > bValue) return dashboardSort.direction === 'asc' ? 1 : -1;
            return 0;
          });
        }
        return sortableItems;
      }, [filteredDashboardData, dashboardSort]);

      const gradeDistribution = useMemo(() => {
        const dist = {};
        filteredDashboardData.forEach(item => { if (item.tier) dist[item.tier] = (dist[item.tier] || 0) + 1; });
        return dist;
      }, [filteredDashboardData]);

      // --- 🎯 관리탭(Manage) 이벤트 로직 ---
      const handleManageStudentChange = (e) => {
        const { name, value } = e.target;
        const val = name === 'year' || name === 'grade' ? Number(value) : value;
        
        setManageStudent(prev => {
          const next = { ...prev, [name]: val };
          // 이름을 입력했을 때, 해당 연도의 기존 학생 정보가 있으면 학교/학년 자동 완성
          if (name === 'name') {
             const existingInfo = data.find(d => d.year === next.year && d.name === val);
             if (existingInfo) {
                next.school = existingInfo.school;
                next.grade = existingInfo.grade;
             }
          }
          return next;
        });
      };

      // 현재 선택된 학생의 특정 연도 데이터 (엑셀 그리드용)
      const currentStudentData = useMemo(() => {
        if(!manageStudent.name) return [];
        return data.filter(d => d.year === manageStudent.year && d.name === manageStudent.name);
      }, [data, manageStudent]);

      const openScoreModal = (exam, subject, existingRecord = null) => {
        if (!manageStudent.name.trim() || !manageStudent.school.trim()) {
          alert('먼저 상단에 학생 이름과 학교를 입력해주세요!');
          return;
        }
        
        if (existingRecord) {
          setModalForm(existingRecord);
          setModal({ isOpen: true, mode: 'edit' });
        } else {
          // 새로 추가 (기존에 같은 과목으로 넣었던 학원반이 있다면 기본값으로 제안)
          const lastClass = currentStudentData.find(d => d.subject === subject)?.className || '';
          setModalForm({
            docId: null, exam, subject, detailSubject: '', score: '', tier: '', className: lastClass
          });
          setModal({ isOpen: true, mode: 'add' });
        }
      };

      const handleModalFormChange = (e) => {
        const { name, value } = e.target;
        setModalForm(prev => ({
          ...prev, [name]: (name === 'score' || name === 'tier') ? Number(value) : value
        }));
      };

      const handleModalSubmit = async (e) => {
        e.preventDefault();
        if(!db || !window.FirebaseAPI) return;

        try {
            const { addDoc, updateDoc, doc, collection } = window.FirebaseAPI;
            const colPath = typeof __app_id !== 'undefined' ? `artifacts/${__app_id}/public/data/scores` : `openacademy/data/scores`;
            
            // 학생 공통 정보와 모달 폼 정보를 합쳐서 저장
            const saveData = {
                year: manageStudent.year,
                school: manageStudent.school,
                grade: manageStudent.grade,
                name: manageStudent.name,
                exam: modalForm.exam,
                subject: modalForm.subject,
                detailSubject: modalForm.detailSubject || '', // 세부과목명
                score: modalForm.score,
                tier: modalForm.tier,
                className: modalForm.className || '' // 과목별 학원반
            };

            if (modal.mode === 'edit') {
                await updateDoc(doc(db, colPath, modalForm.docId), saveData);
            } else {
                await addDoc(collection(db, colPath), saveData);
            }
            setModal({ isOpen: false, mode: 'add' });
        } catch (error) {
            console.error("데이터 저장 오류:", error); alert("저장 중 오류가 발생했습니다.");
        }
      };

      const handleRecordDelete = async () => {
        if(!window.FirebaseAPI) return;
        if (window.confirm('정말 이 성적 기록을 삭제하시겠습니까?')) {
            try {
                const { deleteDoc, doc } = window.FirebaseAPI;
                const colPath = typeof __app_id !== 'undefined' ? `artifacts/${__app_id}/public/data/scores` : `openacademy/data/scores`;
                await deleteDoc(doc(db, colPath, modalForm.docId));
                setModal({ isOpen: false, mode: 'add' });
            } catch (error) {
                alert("삭제 중 오류가 발생했습니다.");
            }
        }
      };


      // --- 에러 및 로딩 렌더링 ---
      if (initError) {
          return (
            <div className="min-h-screen flex flex-col items-center justify-center bg-slate-50 p-6 text-center">
                <i className="fas fa-exclamation-triangle text-6xl text-red-400 mb-4"></i>
                <h2 className="text-2xl font-bold text-slate-800">연결 또는 권한 오류 발생</h2>
                <div className="bg-red-50 text-red-600 p-4 rounded-md mt-4 font-mono text-sm inline-block text-left max-w-2xl break-all">{initError}</div>
                <p className="text-slate-600 mt-6 max-w-lg">
                    문채 선생님, Firebase 콘솔에서 <b>'익명(Anonymous)' 로그인을 사용 설정</b>하셨는지, <br/>
                    Firestore <b>[규칙(Rules)]</b>이 올바르게 설정되었는지 확인해 주세요.
                </p>
            </div>
          );
      }

      if (isLoading) {
          return (
              <div className="min-h-screen flex flex-col items-center justify-center bg-slate-50">
                  <i className="fas fa-circle-notch fa-spin text-5xl text-indigo-600 mb-4"></i>
                  <h2 className="text-xl font-bold text-slate-800">클라우드 시스템 접속 중...</h2>
              </div>
          );
      }

      return (
        <div className="min-h-screen bg-slate-50 font-sans text-slate-800 print:bg-white print:m-0 print:p-0">
          
          <header className="bg-indigo-700 text-white shadow-md print:hidden">
            <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4 flex flex-col sm:flex-row justify-between items-center gap-4">
              <div className="flex items-center space-x-3">
                {!logoError ? (
                  <img src="logo.png" alt="열린학원 로고" className="h-9 w-auto object-contain bg-white rounded p-1" onError={() => setLogoError(true)} />
                ) : (
                  <i className="fas fa-school text-3xl text-indigo-200"></i>
                )}
                <h1 className="text-2xl font-bold tracking-tight">문산 열린학원 <span className="text-indigo-200 font-light">성적 분석 시스템</span></h1>
              </div>
              <div className="flex space-x-2">
                <button onClick={() => setView('dashboard')} className={`px-4 py-2 rounded-md font-medium transition-colors ${view === 'dashboard' ? 'bg-white text-indigo-700 shadow-inner' : 'bg-indigo-600 hover:bg-indigo-500 text-white'}`}>
                  대시보드 분석
                </button>
                <button onClick={() => setView('manage')} className={`px-4 py-2 rounded-md font-medium transition-colors ${view === 'manage' ? 'bg-white text-indigo-700 shadow-inner' : 'bg-indigo-600 hover:bg-indigo-500 text-white'}`}>
                  학생별 성적입력(엑셀형)
                </button>
              </div>
            </div>
          </header>

          <main className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 space-y-6 print:py-0 print:max-w-full">
            
            {view === 'dashboard' ? (
              /* ================= 대시보드 뷰 ================= */
              <div className="space-y-6 print:space-y-4">
                
                {/* 대시보드 필터 영역 */}
                <div className="bg-white p-5 rounded-xl shadow-sm border border-slate-200 flex flex-col gap-4 print:hidden">
                  <div className="flex justify-between items-center border-b pb-2">
                    <div className="flex items-center space-x-2 text-indigo-700 font-semibold">
                      <i className="fas fa-filter text-xl"></i><span>대시보드 분석 기준</span>
                    </div>
                    <button onClick={resetFilters} className="flex items-center space-x-1 text-sm text-slate-500 hover:text-indigo-600 transition-colors bg-slate-100 hover:bg-indigo-50 px-3 py-1.5 rounded-md">
                      <i className="fas fa-sync-alt text-base"></i><span>필터 초기화</span>
                    </button>
                  </div>
                  
                  <div className="flex flex-wrap gap-4 items-end">
                    <div className="flex-1 min-w-[120px]">
                      <label className="block text-xs font-medium text-slate-500 mb-1">연도</label>
                      <select name="year" value={filters.year} onChange={handleFilterChange} className="w-full border border-slate-300 rounded-md p-2 text-sm focus:ring-2 focus:ring-indigo-500">
                        {YEARS.map(y => <option key={y} value={y}>{y}년</option>)}
                      </select>
                    </div>
                    <div className="flex-1 min-w-[140px]">
                      <label className="block text-xs font-medium text-slate-500 mb-1">시험</label>
                      <select name="exam" value={filters.exam} onChange={handleFilterChange} className="w-full border border-slate-300 rounded-md p-2 text-sm focus:ring-2 focus:ring-indigo-500">
                        {EXAMS.map(e => <option key={e} value={e}>{e}</option>)}
                      </select>
                    </div>
                    <div className="flex-1 min-w-[140px]">
                      <label className="block text-xs font-medium text-slate-500 mb-1">학교</label>
                      <select name="school" value={filters.school} onChange={handleFilterChange} className="w-full border border-slate-300 rounded-md p-2 text-sm focus:ring-2 focus:ring-indigo-500">
                        {schools.map(s => <option key={s} value={s}>{s}</option>)}
                      </select>
                    </div>
                    <div className="flex-1 min-w-[100px]">
                      <label className="block text-xs font-medium text-slate-500 mb-1">학년</label>
                      <select name="grade" value={filters.grade} onChange={handleFilterChange} className="w-full border border-slate-300 rounded-md p-2 text-sm focus:ring-2 focus:ring-indigo-500">
                        <option value="전체">전체</option>
                        {GRADES.map(g => <option key={g} value={g}>{g}학년</option>)}
                      </select>
                    </div>
                    <div className="flex-1 min-w-[140px]">
                      <label className="block text-xs font-medium text-slate-500 mb-1">학원반(전체)</label>
                      <select name="className" value={filters.className} onChange={handleFilterChange} className="w-full border border-slate-300 rounded-md p-2 text-sm focus:ring-2 focus:ring-indigo-500">
                        {classNames.map(c => <option key={c} value={c}>{c}</option>)}
                      </select>
                    </div>
                  </div>

                  <div className="pt-2 flex flex-wrap gap-2 items-center">
                    <span className="text-xs font-medium text-slate-500 mr-2">조회 과목:</span>
                    {['전체', ...SUBJECTS].map(sub => (
                      <button key={sub} onClick={() => setActiveSubject(sub)} className={`px-5 py-2 rounded-full text-sm font-bold transition-all border ${activeSubject === sub ? `ring-2 ring-offset-1 shadow-md ${SUBJECT_COLORS[sub]}` : 'bg-white text-slate-500 border-slate-200 hover:bg-slate-50'}`}>
                        {sub}
                      </button>
                    ))}
                  </div>
                </div>

                <div className="hidden print:block text-center border-b-2 border-indigo-700 pb-4 mb-6">
                   <h2 className="text-3xl font-bold text-slate-800">{filters.year}년 {filters.exam} 성적 분석 보고서</h2>
                   <p className="text-slate-600 mt-2 font-medium">
                     [ 기준: {filters.school} / {filters.grade === '전체' ? '전학년' : `${filters.grade}학년`} / {filters.className} / {activeSubject} ]
                   </p>
                </div>

                <div className="flex justify-between items-center print:hidden">
                  <div className="text-sm font-medium text-emerald-600 bg-emerald-50 px-3 py-1.5 rounded-full border border-emerald-200">
                    <i className="fas fa-cloud-check mr-2"></i> 클라우드 동기화 완료
                  </div>
                  <button onClick={() => window.print()} className="flex items-center space-x-2 bg-slate-800 hover:bg-slate-700 text-white px-4 py-2 rounded-md font-medium transition-colors shadow-sm">
                    <i className="fas fa-print text-base"></i><span>보고서 출력하기</span>
                  </button>
                </div>

                {/* 요약 카드 (2개) */}
                <div className="grid grid-cols-1 md:grid-cols-2 gap-6 print:grid-cols-2">
                  <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200 flex items-center space-x-5">
                    <div className="p-4 bg-blue-100 text-blue-600 rounded-xl"><i className="fas fa-users text-4xl"></i></div>
                    <div>
                      <p className="text-sm font-medium text-slate-500 mb-1">조회된 성적 건수 (학생수)</p>
                      <p className="text-3xl font-extrabold text-slate-800">{filteredDashboardData.length}건</p>
                    </div>
                  </div>
                  <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200 flex items-center space-x-5">
                    <div className="p-4 bg-emerald-100 text-emerald-600 rounded-xl"><i className="fas fa-chart-line text-4xl"></i></div>
                    <div>
                      <p className="text-sm font-medium text-slate-500 mb-1">평균 점수</p>
                      <p className="text-3xl font-extrabold text-slate-800">
                        {filteredDashboardData.length > 0 ? (filteredDashboardData.reduce((acc, curr) => acc + curr.score, 0) / filteredDashboardData.length).toFixed(1) : 0}점
                      </p>
                    </div>
                  </div>
                </div>

                <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200 print:break-inside-avoid">
                  <h3 className="text-lg font-bold text-slate-800 mb-4 border-b pb-2">입력 등급별 분포 현황</h3>
                  <div className="flex items-end h-56 space-x-2 pt-4">
                    {[1,2,3,4,5,6,7,8,9].map(grade => {
                      const count = gradeDistribution[grade] || 0;
                      const maxCount = Math.max(...Object.values(gradeDistribution), 1);
                      const heightPercent = (count / maxCount) * 100;
                      return (
                        <div key={grade} className="flex-1 flex flex-col items-center justify-end group relative">
                          {count > 0 && <span className="text-sm font-bold text-indigo-600 mb-1 opacity-100 transition-opacity absolute -top-6 print:text-black">{count}명</span>}
                          <div className={`w-full max-w-[50px] rounded-t-md transition-all duration-500 ease-out print:border print:border-slate-800 ${grade <= 3 ? 'bg-indigo-500 print:bg-slate-400' : 'bg-slate-200 hover:bg-slate-300 print:bg-slate-100'}`} style={{ height: `${Math.max(heightPercent, count > 0 ? 5 : 0)}%` }}></div>
                          <span className="text-sm font-medium text-slate-600 mt-3 whitespace-nowrap">{grade}등급</span>
                        </div>
                      );
                    })}
                  </div>
                </div>

                <div className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden print:border-none print:shadow-none print:break-inside-avoid">
                   <div className="p-4 bg-slate-50 border-b border-slate-200 flex justify-between items-center print:bg-white print:border-b-2 print:border-slate-800 print:p-2">
                      <h3 className="font-bold text-slate-800">상세 명단 및 성적</h3>
                      <span className="text-xs text-slate-500 bg-white px-2 py-1 rounded border print:hidden">열 제목을 클릭하여 정렬</span>
                   </div>
                   <div className="overflow-x-auto">
                    <table className="w-full text-sm text-left border-collapse">
                      <thead className="bg-slate-100 text-slate-600 uppercase text-xs font-semibold print:bg-slate-100 print:text-black">
                        <tr>
                          {[{key:'school', label:'학교'}, {key:'grade', label:'학년'}, {key:'className', label:'과목별 학원반'}, {key:'name', label:'이름'}, {key:'subject', label:'과목(세부)'}, {key:'score', label:'원점수'}, {key:'tier', label:'등급'}].map((col) => (
                            <th key={col.key} onClick={() => setDashboardSort({ key: col.key, direction: dashboardSort.direction === 'asc' ? 'desc' : 'asc' })} className="px-4 py-3 text-center cursor-pointer hover:bg-slate-200 transition-colors whitespace-nowrap border-b print:border-slate-300">
                              <div className="flex items-center justify-center space-x-1">
                                <span>{col.label}</span><i className="fas fa-sort text-xs text-slate-400 print:hidden"></i>
                              </div>
                            </th>
                          ))}
                        </tr>
                      </thead>
                      <tbody className="divide-y divide-slate-200">
                        {sortedDashboardData.length > 0 ? sortedDashboardData.map((row) => (
                          <tr key={row.docId} className="hover:bg-slate-50 transition-colors">
                            <td className="px-4 py-3 text-center whitespace-nowrap">{row.school}</td>
                            <td className="px-4 py-3 text-center whitespace-nowrap">{row.grade}학년</td>
                            <td className="px-4 py-3 text-center whitespace-nowrap text-slate-500">{row.className || '-'}</td>
                            <td className="px-4 py-3 text-center whitespace-nowrap font-medium text-slate-800">{row.name}</td>
                            <td className="px-4 py-3 text-center whitespace-nowrap">
                               {row.subject} {row.detailSubject && <span className="text-xs font-bold text-indigo-500">({row.detailSubject})</span>}
                            </td>
                            <td className="px-4 py-3 text-center whitespace-nowrap font-bold text-indigo-600 print:text-black">{row.score}점</td>
                            <td className="px-4 py-3 text-center whitespace-nowrap">
                              <span className={`px-3 py-1 rounded-full text-xs font-bold print:border print:bg-white print:text-black ${row.tier <= 3 ? 'bg-blue-100 text-blue-700' : 'bg-slate-100 text-slate-700'}`}>{row.tier}등급</span>
                            </td>
                          </tr>
                        )) : (
                          <tr><td colSpan="7" className="px-4 py-8 text-center text-slate-500 border-b print:border-slate-300">데이터가 없습니다.</td></tr>
                        )}
                      </tbody>
                    </table>
                  </div>
                </div>
              </div>
            ) : (
              /* ================= 엑셀형 성적 입력 뷰 ================= */
              <div className="space-y-6">
                
                {/* 1. 학생 선택 영역 (엑셀의 상단부) */}
                <div className="bg-white p-5 rounded-xl shadow-sm border border-indigo-300 flex flex-col gap-4 relative overflow-hidden">
                  <div className="absolute top-0 right-0 w-32 h-32 bg-indigo-50 rounded-bl-full -z-10"></div>
                  <div className="flex items-center space-x-2 text-indigo-700 font-bold border-b pb-2">
                    <i className="fas fa-user-graduate text-xl"></i><span>학생 선택 및 기본 정보 (필수입력)</span>
                  </div>
                  
                  <div className="flex flex-wrap gap-4 items-end">
                    <div className="flex-1 min-w-[100px]">
                      <label className="block text-xs font-bold text-slate-600 mb-1">연도</label>
                      <select name="year" value={manageStudent.year} onChange={handleManageStudentChange} className="w-full border-2 border-indigo-100 rounded-md p-2.5 text-sm font-semibold focus:ring-2 focus:ring-indigo-500 outline-none transition-all">
                        {YEARS.map(y => <option key={y} value={y}>{y}년</option>)}
                      </select>
                    </div>
                    <div className="flex-[2] min-w-[180px] relative">
                      <label className="block text-xs font-bold text-indigo-600 mb-1"><i className="fas fa-search mr-1"></i>학생 이름 검색/입력</label>
                      <input type="text" name="name" list="student-list" value={manageStudent.name} onChange={handleManageStudentChange} placeholder="이름을 입력하세요" autoComplete="off" className="w-full border-2 border-indigo-200 bg-indigo-50/50 rounded-md p-2.5 text-sm font-bold focus:ring-2 focus:ring-indigo-500 focus:bg-white outline-none transition-all" />
                      <datalist id="student-list">
                        {uniqueStudentNames.map(name => <option key={name} value={name} />)}
                      </datalist>
                    </div>
                    <div className="flex-1 min-w-[150px]">
                      <label className="block text-xs font-bold text-slate-600 mb-1">소속 학교</label>
                      <input type="text" name="school" value={manageStudent.school} onChange={handleManageStudentChange} placeholder="예: 문산고" className="w-full border border-slate-300 rounded-md p-2.5 text-sm focus:ring-2 focus:ring-indigo-500 outline-none" />
                    </div>
                    <div className="flex-1 min-w-[100px]">
                      <label className="block text-xs font-bold text-slate-600 mb-1">학년</label>
                      <select name="grade" value={manageStudent.grade} onChange={handleManageStudentChange} className="w-full border border-slate-300 rounded-md p-2.5 text-sm focus:ring-2 focus:ring-indigo-500 outline-none">
                        {GRADES.map(g => <option key={g} value={g}>{g}학년</option>)}
                      </select>
                    </div>
                  </div>
                  <p className="text-xs text-slate-400"><i className="fas fa-info-circle"></i> 기존 학생 이름을 입력하면 학교와 학년이 자동으로 불러와집니다.</p>
                </div>

                {/* 2. 엑셀형 성적 입력 그리드 (이름이 있어야 보임) */}
                <div className={`transition-opacity duration-500 ${manageStudent.name && manageStudent.school ? 'opacity-100' : 'opacity-40 pointer-events-none'}`}>
                  <div className="bg-white rounded-xl shadow-sm border border-slate-300 overflow-hidden">
                     <div className="p-4 bg-slate-800 text-white flex justify-between items-center">
                        <h3 className="font-bold"><span className="text-amber-400">{manageStudent.name || '???'}</span> 학생 성적 보드</h3>
                        <span className="text-xs text-slate-300">칸을 클릭하여 여러 과목을 자유롭게 추가/수정하세요</span>
                     </div>
                     <div className="overflow-x-auto p-4">
                      <table className="w-full text-sm text-left border-collapse border border-slate-300">
                        <thead className="bg-slate-100">
                          <tr>
                            <th className="border border-slate-300 px-4 py-3 text-center font-bold text-slate-700 w-32 bg-slate-200">시험 구분</th>
                            {SUBJECTS.map((col) => (
                              <th key={col} className={`border border-slate-300 px-4 py-3 text-center font-bold ${SUBJECT_COLORS[col].replace('bg-', 'bg-').replace('border-', 'border-').split(' ')[0]}`}>{col}</th>
                            ))}
                          </tr>
                        </thead>
                        <tbody>
                          {EXAMS.map(exam => (
                            <tr key={exam}>
                              <td className="border border-slate-300 px-4 py-3 text-center font-bold bg-slate-50 text-slate-700 whitespace-nowrap">{exam}</td>
                              {SUBJECTS.map(subject => {
                                 // 이 셀에 해당하는 성적들 찾기
                                 const cellScores = currentStudentData.filter(d => d.exam === exam && d.subject === subject);
                                 return (
                                    <td key={subject} className="border border-slate-300 p-2 align-top h-28 relative group w-[20%] hover:bg-slate-50 transition-colors">
                                       
                                       <div className="space-y-2 mb-8">
                                          {cellScores.map(record => (
                                             <div key={record.docId} onClick={() => openScoreModal(exam, subject, record)} 
                                                  className="bg-white border border-indigo-200 shadow-sm p-2 rounded-md cursor-pointer hover:border-indigo-500 hover:shadow transition-all relative overflow-hidden">
                                                <div className="absolute left-0 top-0 bottom-0 w-1 bg-indigo-500"></div>
                                                <div className="font-bold text-indigo-800 text-xs pl-2">
                                                   {subject} {record.detailSubject && <span className="text-indigo-500">({record.detailSubject})</span>}
                                                </div>
                                                <div className="flex justify-between items-end mt-1 pl-2">
                                                   <span className="text-lg font-black text-slate-700">{record.score}<span className="text-xs font-normal text-slate-500">점</span></span>
                                                   <span className="text-sm font-bold text-red-500">{record.tier}<span className="text-xs font-normal">등급</span></span>
                                                </div>
                                                {record.className && <div className="text-[10px] text-slate-400 mt-1 pl-2 truncate">{record.className}</div>}
                                             </div>
                                          ))}
                                       </div>

                                       {/* 성적 추가 버튼 (호버 시 표시 또는 비어있을 때 표시) */}
                                       <button onClick={() => openScoreModal(exam, subject)} 
                                               className={`absolute bottom-2 left-1/2 -translate-x-1/2 w-[80%] py-1.5 text-xs font-bold rounded flex items-center justify-center space-x-1 transition-all
                                                          ${cellScores.length > 0 ? 'opacity-0 group-hover:opacity-100 bg-indigo-100 text-indigo-600 hover:bg-indigo-200' : 'bg-slate-100 text-slate-400 hover:bg-indigo-100 hover:text-indigo-600'}`}>
                                          <i className="fas fa-plus"></i> <span>과목 추가</span>
                                       </button>
                                    </td>
                                 );
                              })}
                            </tr>
                          ))}
                        </tbody>
                      </table>
                    </div>
                  </div>
                </div>

              </div>
            )}
          </main>

          {/* 모달 창 (성적 상세 입력/수정) */}
          {modal.isOpen && (
             <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/50 backdrop-blur-sm p-4 print:hidden">
                <div className="bg-white rounded-2xl shadow-2xl w-full max-w-md overflow-hidden transform transition-all">
                   <div className="bg-indigo-600 p-4 flex justify-between items-center text-white">
                      <h3 className="font-bold text-lg"><i className="fas fa-edit mr-2"></i>{modalForm.exam} - {modalForm.subject} 성적 {modal.mode === 'edit' ? '수정' : '입력'}</h3>
                      <button onClick={() => setModal({isOpen:false})} className="text-indigo-200 hover:text-white transition-colors"><i className="fas fa-times text-xl"></i></button>
                   </div>
                   
                   <form onSubmit={handleModalSubmit} className="p-6 space-y-4">
                      {/* 세부 과목명 (다수 과목 응시 해결 핵심키) */}
                      <div>
                         <label className="block text-sm font-bold text-slate-700 mb-1">세부 과목명 <span className="text-xs font-normal text-slate-400">(선택)</span></label>
                         <input type="text" name="detailSubject" value={modalForm.detailSubject} onChange={handleModalFormChange} placeholder="예: 화학1, 기하, 미적분 등" className="w-full border border-slate-300 rounded-md p-2.5 text-sm focus:ring-2 focus:ring-indigo-500 outline-none" />
                         <p className="text-[11px] text-indigo-500 mt-1"><i className="fas fa-lightbulb"></i> 과탐 2과목 등 한 과목을 여러 개 칠 때 구분용으로 씁니다.</p>
                      </div>

                      {/* 학원반 (과목별로 다르게 지정 가능) */}
                      <div>
                         <label className="block text-sm font-bold text-slate-700 mb-1">과목별 학원반 <span className="text-xs font-normal text-slate-400">(선택)</span></label>
                         <input type="text" name="className" list="class-list" value={modalForm.className} onChange={handleModalFormChange} placeholder="예: SKY반 (국어/과학은 비워둬도 됨)" autoComplete="off" className="w-full border border-slate-300 rounded-md p-2.5 text-sm focus:ring-2 focus:ring-indigo-500 outline-none" />
                         <datalist id="class-list">
                            {classNames.map(c => <option key={c} value={c} />)}
                         </datalist>
                      </div>

                      <div className="grid grid-cols-2 gap-4 pt-2">
                         <div>
                            <label className="block text-sm font-bold text-slate-700 mb-1 text-center">원점수</label>
                            <input type="number" name="score" value={modalForm.score} onChange={handleModalFormChange} required min="0" max="100" placeholder="0~100" className="w-full border-2 border-slate-200 bg-slate-50 rounded-md p-3 text-center text-lg font-bold focus:ring-2 focus:ring-indigo-500 focus:bg-white outline-none" />
                         </div>
                         <div>
                            <label className="block text-sm font-bold text-indigo-600 mb-1 text-center">산출 등급</label>
                            <input type="number" name="tier" value={modalForm.tier} onChange={handleModalFormChange} required min="1" max="9" placeholder="1~9" className="w-full border-2 border-indigo-200 bg-indigo-50 rounded-md p-3 text-center text-lg font-bold text-indigo-700 focus:ring-2 focus:ring-indigo-500 focus:bg-white outline-none" />
                         </div>
                      </div>

                      <div className="pt-6 flex gap-2">
                         {modal.mode === 'edit' && (
                            <button type="button" onClick={handleRecordDelete} className="px-4 py-3 bg-red-100 hover:bg-red-200 text-red-600 font-bold rounded-lg transition-colors">
                               <i className="fas fa-trash-alt"></i>
                            </button>
                         )}
                         <button type="submit" className="flex-1 py-3 bg-indigo-600 hover:bg-indigo-700 text-white font-bold rounded-lg transition-colors flex items-center justify-center space-x-2 shadow-md">
                            <i className="fas fa-check"></i> <span>{modal.mode === 'edit' ? '수정 완료' : '성적 추가하기'}</span>
                         </button>
                      </div>
                   </form>
                </div>
             </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<OpenAcademyAnalysis />);
  </script>
</body>
</html>
