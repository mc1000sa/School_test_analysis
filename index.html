<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>열린학원 성적분석 시스템 (최종 안정화본)</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="module">
    import { initializeApp, getApps, getApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import {
      getFirestore,
      collection,
      onSnapshot,
      addDoc,
      updateDoc,
      doc,
      query,
      where,
      getDocs,
    } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    window.FirebaseAPI = {
      initializeApp,
      getApps,
      getApp,
      getAuth,
      signInAnonymously,
      signInWithCustomToken,
      onAuthStateChanged,
      getFirestore,
      collection,
      onSnapshot,
      addDoc,
      updateDoc,
      doc,
      query,
      where,
      getDocs,
    };
  </script>

  <style>
    body { background: #f5f6fb; }
    .glass-card { background: rgba(255,255,255,0.88); backdrop-filter: blur(12px); }
    .app-shell { min-height: 100vh; background:
      radial-gradient(circle at top left, rgba(109,40,217,0.10), transparent 25%),
      radial-gradient(circle at top right, rgba(99,102,241,0.08), transparent 22%),
      #f6f7fb; }
    .sidebar-shadow { box-shadow: 0 24px 60px rgba(15,23,42,0.08); }
    .panel-shadow { box-shadow: 0 10px 35px rgba(15,23,42,0.07); }
    .soft-border { border: 1px solid rgba(226,232,240,0.9); }
    .nav-pill-active { background: linear-gradient(135deg, #5b21b6, #7c3aed); color: white; box-shadow: 0 12px 28px rgba(91,33,182,0.25); }
    .nav-pill { color: #475569; }
    .nav-pill:hover { background: #f3f4f6; color: #111827; }
    .mini-card { background: linear-gradient(180deg, rgba(255,255,255,0.97), rgba(255,255,255,0.90)); }
    .hero-gradient { background: linear-gradient(135deg, rgba(91,33,182,0.08), rgba(124,58,237,0.04)); }
    @media (max-width: 1024px) {
      .desktop-sidebar { display:none; }
      .content-wrap { padding-left: 0 !important; }
    }
  </style>

</head>
<body class="bg-gradient-to-br from-slate-50 via-white to-indigo-50">
  <div id="root"></div>

  <script type="text/babel">
    const { useEffect, useMemo, useState } = React;

    const EXAMS = ['1학기 중간고사', '1학기 기말고사', '2학기 중간고사', '2학기 기말고사'];
    const SUBJECTS = ['국어', '영어', '수학', '과학'];
    const GRADES = [1, 2, 3];
    const YEARS = [2026, 2027, 2028];

    const SUBJECT_COLORS = {
      '전체': 'bg-slate-100 text-slate-700 hover:bg-slate-200 border-slate-300',
      '국어': 'bg-pink-100 text-pink-700 hover:bg-pink-200 border-pink-300',
      '영어': 'bg-orange-100 text-orange-700 hover:bg-orange-200 border-orange-300',
      '수학': 'bg-blue-100 text-blue-700 hover:bg-blue-200 border-blue-300',
      '과학': 'bg-emerald-100 text-emerald-700 hover:bg-emerald-200 border-emerald-300',
    };

    function App() {
      const [db, setDb] = useState(null);
      const [user, setUser] = useState(null);
      const [isLoading, setIsLoading] = useState(false);
      const [initError, setInitError] = useState('');

      const [teachersData, setTeachersData] = useState([]);
      const [studentsData, setStudentsData] = useState([]);
      const [scoresData, setScoresData] = useState([]);

      const [selectedTeacherName, setSelectedTeacherName] = useState('');
      const [loginPin, setLoginPin] = useState('');
      const [loginError, setLoginError] = useState('');
      const [isLoggedIn, setIsLoggedIn] = useState(false);
      const [currentTeacher, setCurrentTeacher] = useState(null);

      const [view, setView] = useState('dashboard');
      const [logoError, setLogoError] = useState(false);

      const [filters, setFilters] = useState({
        year: 2026,
        exam: '1학기 중간고사',
        school: '전체',
        grade: '전체',
        className: '전체',
      });
      const [activeSubject, setActiveSubject] = useState('전체');
      const [dashboardSort, setDashboardSort] = useState({ key: 'score', direction: 'desc' });

      const [manageStudent, setManageStudent] = useState({ year: 2026, name: '', school: '', grade: 1 });
      const [modal, setModal] = useState({ isOpen: false, mode: 'add' });
      const [modalForm, setModalForm] = useState({
        docId: null,
        exam: '',
        subject: '',
        detailSubject: '',
        score: '',
        tier: '',
        className: '',
      });

      const getPath = (name) => {
        return typeof __app_id !== 'undefined'
          ? `artifacts/${__app_id}/public/data/${name}`
          : `openacademy/data/${name}`;
      };

      useEffect(() => {
        const initFirebase = async () => {
          setIsLoading(true);
          try {
            let attempts = 0;
            while (!window.FirebaseAPI && attempts < 50) {
              await new Promise((r) => setTimeout(r, 100));
              attempts++;
            }
            if (!window.FirebaseAPI) throw new Error('Firebase 모듈을 불러올 수 없습니다.');

            const {
              initializeApp,
              getApps,
              getApp,
              getAuth,
              signInAnonymously,
              signInWithCustomToken,
              onAuthStateChanged,
              getFirestore,
            } = window.FirebaseAPI;

            let firebaseConfig;
            if (typeof __firebase_config !== 'undefined') {
              firebaseConfig = JSON.parse(__firebase_config);
            } else {
               firebaseConfig = {
                apiKey: "AIzaSyCAT_dBqH8QHwJG-E1vNkWlBiyzRx8y-Ac",
                authDomain: "open-school-3f74c.firebaseapp.com",
                projectId: "open-school-3f74c",
              };
            }

            const app = !getApps().length ? initializeApp(firebaseConfig) : getApp();
            const auth = getAuth(app);
            const database = getFirestore(app);
            setDb(database);

            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
              await signInWithCustomToken(auth, __initial_auth_token);
            } else {
              await signInAnonymously(auth);
            }

            onAuthStateChanged(auth, (u) => {
              setUser(u || null);
            });
          } catch (error) {
            console.error(error);
            setInitError('Firebase 초기화 실패: ' + error.message);
            setIsLoading(false);
          }
        };

        initFirebase();
      }, []);

      useEffect(() => {
        if (!user || !db || !window.FirebaseAPI) return;

        let unsubscribeTeachers;
        let unsubscribeStudents;
        let unsubscribeScores;

        try {
          const { collection, onSnapshot } = window.FirebaseAPI;
          const teachersPath = getPath('teachers');
          const studentsPath = getPath('students');
          const scoresPath = getPath('scores');

          let teachersReady = false;
          let studentsReady = false;
          let scoresReady = false;

          const finishLoadingIfReady = () => {
            if (teachersReady && studentsReady && scoresReady) {
              setIsLoading(false);
            }
          };

          unsubscribeTeachers = onSnapshot(
            collection(db, teachersPath),
            (snapshot) => {
              const items = [];
              snapshot.forEach((d) => items.push({ teacherId: d.id, ...d.data() }));
              setTeachersData(
                items
                  .filter((t) => t.isActive !== false)
                  .sort((a, b) => String(a.name || '').localeCompare(String(b.name || ''), 'ko'))
              );
              teachersReady = true;
              finishLoadingIfReady();
            },
            (error) => {
              setInitError('teachers 데이터를 읽을 수 없습니다: ' + error.message);
              setIsLoading(false);
            }
          );

          unsubscribeStudents = onSnapshot(
            collection(db, studentsPath),
            (snapshot) => {
              const items = [];
              snapshot.forEach((d) => items.push({ studentId: d.id, ...d.data() }));
              setStudentsData(items);
              studentsReady = true;
              finishLoadingIfReady();
            },
            (error) => {
              setInitError('students 데이터를 읽을 수 없습니다: ' + error.message);
              setIsLoading(false);
            }
          );

          unsubscribeScores = onSnapshot(
            collection(db, scoresPath),
            (snapshot) => {
              const items = [];
              snapshot.forEach((d) => items.push({ docId: d.id, ...d.data() }));
              setScoresData(items);
              scoresReady = true;
              finishLoadingIfReady();
            },
            (error) => {
              setInitError('scores 데이터를 읽을 수 없습니다: ' + error.message);
              setIsLoading(false);
            }
          );
        } catch (error) {
          setInitError('데이터베이스 연결 실패: ' + error.message);
          setIsLoading(false);
        }

        return () => {
          if (unsubscribeTeachers) unsubscribeTeachers();
          if (unsubscribeStudents) unsubscribeStudents();
          if (unsubscribeScores) unsubscribeScores();
        };
      }, [user, db]);

      const joinedData = useMemo(() => {
        return scoresData
          .filter((score) => !score.deleted)
          .map((score) => {
            const student = studentsData.find((s) => s.studentId === score.studentId && !s.deleted) || {};
            return {
              ...score,
              name: student.name || '알수없음',
              school: student.school || '-',
              grade: student.grade || 0,
              year: student.year || score.year,
            };
          });
      }, [scoresData, studentsData]);

      const schools = ['전체', ...Array.from(new Set(studentsData.filter((s) => !s.deleted).map((s) => s.school).filter(Boolean)))];
      const classNames = ['전체', ...Array.from(new Set(scoresData.filter((d) => !d.deleted).map((d) => d.className).filter(Boolean)))];
      const uniqueStudentNames = Array.from(
        new Set(
          studentsData
            .filter((s) => s.year === manageStudent.year && !s.deleted)
            .map((s) => s.name)
            .filter(Boolean)
        )
      );

      const handleFilterChange = (e) => {
        const { name, value } = e.target;
        setFilters((prev) => ({
          ...prev,
          [name]: name === 'year' ? Number(value) : value,
        }));
      };

      const resetFilters = () => {
        setFilters({ year: 2026, exam: '1학기 중간고사', school: '전체', grade: '전체', className: '전체' });
        setActiveSubject('전체');
      };

      const filteredDashboardData = useMemo(() => {
        return joinedData.filter((item) => {
          return (
            item.year === filters.year &&
            item.exam === filters.exam &&
            (filters.school === '전체' || item.school === filters.school) &&
            (filters.grade === '전체' || item.grade === Number(filters.grade)) &&
            (filters.className === '전체' || item.className === filters.className) &&
            (activeSubject === '전체' || item.subject === activeSubject)
          );
        });
      }, [joinedData, filters, activeSubject]);

      const sortedDashboardData = useMemo(() => {
        const sortableItems = [...filteredDashboardData];
        if (dashboardSort.key !== null) {
          sortableItems.sort((a, b) => {
            let aValue = a[dashboardSort.key];
            let bValue = b[dashboardSort.key];
            if (typeof aValue === 'string') {
              aValue = aValue.toLowerCase();
              bValue = bValue.toLowerCase();
            }
            if (aValue < bValue) return dashboardSort.direction === 'asc' ? -1 : 1;
            if (aValue > bValue) return dashboardSort.direction === 'asc' ? 1 : -1;
            return 0;
          });
        }
        return sortableItems;
      }, [filteredDashboardData, dashboardSort]);

      const gradeDistribution = useMemo(() => {
        const dist = {};
        filteredDashboardData.forEach((item) => {
          if (item.tier) dist[item.tier] = (dist[item.tier] || 0) + 1;
        });
        return dist;
      }, [filteredDashboardData]);

      const handleTeacherLogin = (e) => {
        e.preventDefault();

        if (!selectedTeacherName.trim()) {
          setLoginError('선생님 이름을 먼저 선택해주세요.');
          return;
        }

        const foundTeacher = teachersData.find(
          (t) => String(t.name || '').trim() === selectedTeacherName.trim() && String(t.pin || '').trim() === loginPin.trim() && t.isActive !== false
        );

        if (!foundTeacher) {
          setLoginError('PIN이 올바르지 않습니다.');
          return;
        }

        setCurrentTeacher(foundTeacher);
        setIsLoggedIn(true);
        setLoginError('');
      };

      const handleLogout = () => {
        setIsLoggedIn(false);
        setCurrentTeacher(null);
        setSelectedTeacherName('');
        setLoginPin('');
        setView('dashboard');
      };

      const handleManageStudentChange = (e) => {
        const { name, value } = e.target;
        const val = name === 'year' || name === 'grade' ? Number(value) : value;

        setManageStudent((prev) => {
          const next = { ...prev, [name]: val };
          if (name === 'name') {
            const existingInfo = studentsData.find((s) => s.year === next.year && s.name === val && !s.deleted);
            if (existingInfo) {
              next.school = existingInfo.school;
              next.grade = existingInfo.grade;
            }
          }
          return next;
        });
      };

      const currentStudentData = useMemo(() => {
        if (!manageStudent.name) return [];
        return joinedData.filter((d) => d.year === manageStudent.year && d.name === manageStudent.name);
      }, [joinedData, manageStudent]);

      const openScoreModal = (exam, subject, existingRecord = null) => {
        if (!manageStudent.name.trim() || !manageStudent.school.trim()) {
          alert('먼저 상단에 학생 이름과 학교를 입력해주세요!');
          return;
        }

        if (existingRecord) {
          setModalForm(existingRecord);
          setModal({ isOpen: true, mode: 'edit' });
        } else {
          const lastClass = currentStudentData.find((d) => d.subject === subject)?.className || '';
          setModalForm({
            docId: null,
            exam,
            subject,
            detailSubject: '',
            score: '',
            tier: '',
            className: lastClass,
          });
          setModal({ isOpen: true, mode: 'add' });
        }
      };

      const handleModalFormChange = (e) => {
        const { name, value } = e.target;
        setModalForm((prev) => ({
          ...prev,
          [name]: name === 'score' || name === 'tier' ? Number(value) : value,
        }));
      };

      const handleModalSubmit = async (e) => {
        e.preventDefault();
        if (!db || !window.FirebaseAPI) return;

        try {
          const { addDoc, updateDoc, doc, collection, query, where, getDocs } = window.FirebaseAPI;
          const scoresPath = getPath('scores');
          const studentsPath = getPath('students');

          let targetStudentId = null;
          const q = query(
            collection(db, studentsPath),
            where('name', '==', manageStudent.name),
            where('year', '==', manageStudent.year)
          );
          const querySnapshot = await getDocs(q);

          if (!querySnapshot.empty) {
            targetStudentId = querySnapshot.docs[0].id;
            await updateDoc(doc(db, studentsPath, targetStudentId), {
              school: manageStudent.school,
              grade: manageStudent.grade,
              updatedAt: new Date().toISOString(),
              updatedBy: currentTeacher?.name || '알수없음',
              deleted: false,
            });
          } else {
            const docRef = await addDoc(collection(db, studentsPath), {
              name: manageStudent.name,
              year: manageStudent.year,
              school: manageStudent.school,
              grade: manageStudent.grade,
              createdAt: new Date().toISOString(),
              createdBy: currentTeacher?.name || '알수없음',
              updatedAt: new Date().toISOString(),
              updatedBy: currentTeacher?.name || '알수없음',
              deleted: false,
            });
            targetStudentId = docRef.id;
          }

          const scoreDataToSave = {
            studentId: targetStudentId,
            year: manageStudent.year,
            exam: modalForm.exam,
            subject: modalForm.subject,
            detailSubject: modalForm.detailSubject || '',
            score: modalForm.score,
            tier: modalForm.tier,
            className: modalForm.className || '',
            updatedAt: new Date().toISOString(),
            updatedBy: currentTeacher?.name || '알수없음',
            deleted: false,
          };

          if (modal.mode === 'edit') {
            await updateDoc(doc(db, scoresPath, modalForm.docId), scoreDataToSave);
          } else {
            await addDoc(collection(db, scoresPath), {
              ...scoreDataToSave,
              createdAt: new Date().toISOString(),
              createdBy: currentTeacher?.name || '알수없음',
            });
          }

          setModal({ isOpen: false, mode: 'add' });
        } catch (error) {
          console.error('데이터 저장 오류:', error);
          alert('저장 중 오류가 발생했습니다.');
        }
      };

      const handleRecordDelete = async () => {
        if (!window.confirm('정말 이 성적 기록을 삭제하시겠습니까?')) return;

        try {
          const { updateDoc, doc } = window.FirebaseAPI;
          const scoresPath = getPath('scores');

          await updateDoc(doc(db, scoresPath, modalForm.docId), {
            deleted: true,
            deletedAt: new Date().toISOString(),
            deletedBy: currentTeacher?.name || '알수없음',
            updatedAt: new Date().toISOString(),
            updatedBy: currentTeacher?.name || '알수없음',
          });

          alert('삭제 처리되었습니다. (복구 가능)');
          setModal({ isOpen: false, mode: 'add' });
        } catch (error) {
          console.error('삭제 처리 오류:', error);
          alert('삭제 처리 중 오류가 발생했습니다.');
        }
      };

      if (initError) {
        return (
          <div className="min-h-screen flex flex-col items-center justify-center bg-slate-50 p-6 text-center">
            <i className="fas fa-exclamation-triangle text-6xl text-red-400 mb-4"></i>
            <h2 className="text-2xl font-bold text-slate-800">연결 오류 발생</h2>
            <div className="bg-red-50 text-red-600 p-4 rounded-md mt-4 font-mono text-sm max-w-2xl break-all text-left">{initError}</div>
          </div>
        );
      }

      if (isLoading) {
        return (
          <div className="min-h-screen flex flex-col items-center justify-center bg-slate-50">
            <i className="fas fa-circle-notch fa-spin text-5xl text-indigo-600 mb-4"></i>
            <h2 className="text-xl font-bold text-slate-800">클라우드 시스템 동기화 중...</h2>
          </div>
        );
      }

      if (!isLoggedIn) {
        return (
          <div className="min-h-screen bg-[#f6f7fb] flex items-center justify-center p-4 sm:p-8">
            <div className="w-full max-w-6xl grid lg:grid-cols-[1.08fr_0.92fr] gap-6">
              <div className="hidden lg:flex rounded-[32px] p-10 hero-gradient soft-border panel-shadow items-end relative overflow-hidden">
                <div className="absolute inset-0 bg-[radial-gradient(circle_at_top_left,rgba(124,58,237,0.18),transparent_30%),radial-gradient(circle_at_bottom_right,rgba(99,102,241,0.10),transparent_28%)]"></div>
                <div className="relative z-10 max-w-xl">
                  <div className="inline-flex items-center gap-2 rounded-full bg-white/80 px-4 py-2 text-xs font-semibold text-violet-700 soft-border mb-6">
                    <i className="fas fa-sparkles"></i>
                    Academic Curator
                  </div>
                  <h1 className="text-5xl font-black tracking-tight leading-tight text-slate-900">
                    열린학원
                    <span className="block text-violet-700">성적 입력 · 분석 포털</span>
                  </h1>
                  <p className="mt-5 text-lg text-slate-600 leading-8">
                    선생님들의 입력 속도를 높이고, 학생별 성적 흐름을 한 번에 확인할 수 있도록 만든 내부 관리 시스템입니다.
                  </p>
                  <div className="mt-10 grid grid-cols-3 gap-4">
                    <div className="mini-card rounded-3xl p-4 soft-border panel-shadow">
                      <div className="text-xs font-semibold text-slate-400">Smart Login</div>
                      <div className="mt-2 text-lg font-black text-slate-900">PIN Access</div>
                    </div>
                    <div className="mini-card rounded-3xl p-4 soft-border panel-shadow">
                      <div className="text-xs font-semibold text-slate-400">Fast Entry</div>
                      <div className="mt-2 text-lg font-black text-slate-900">엑셀형 입력</div>
                    </div>
                    <div className="mini-card rounded-3xl p-4 soft-border panel-shadow">
                      <div className="text-xs font-semibold text-slate-400">Dashboard</div>
                      <div className="mt-2 text-lg font-black text-slate-900">분석 리포트</div>
                    </div>
                  </div>
                </div>
              </div>

              <div className="glass-card rounded-[32px] soft-border panel-shadow p-6 sm:p-8 lg:p-10">
                <div className="flex items-center justify-between mb-8">
                  <div>
                    <div className="text-sm font-semibold text-violet-700">Curator Pro</div>
                    <h2 className="mt-1 text-3xl font-black tracking-tight text-slate-900">선생님 로그인</h2>
                    <p className="mt-2 text-sm text-slate-500">목록에서 선생님을 선택하고 PIN만 입력하세요.</p>
                  </div>
                  <div className="h-14 w-14 rounded-2xl bg-violet-100 text-violet-700 flex items-center justify-center">
                    <i className="fas fa-user-shield text-2xl"></i>
                  </div>
                </div>

                <form onSubmit={handleTeacherLogin} className="space-y-5">
                  <div>
                    <label className="block text-sm font-bold text-slate-700 mb-2">선생님 선택</label>
                    <select
                      value={selectedTeacherName}
                      onChange={(e) => setSelectedTeacherName(e.target.value)}
                      className="w-full h-14 px-4 border border-slate-200 rounded-2xl outline-none focus:border-violet-400 focus:ring-4 focus:ring-violet-100 bg-white transition-all text-slate-800"
                    >
                      <option value="">선생님을 선택하세요</option>
                      {teachersData.map((teacher) => (
                        <option key={teacher.teacherId} value={teacher.name}>
                          {teacher.name}
                        </option>
                      ))}
                    </select>
                  </div>

                  <div>
                    <label className="block text-sm font-bold text-slate-700 mb-2">PIN</label>
                    <input
                      type="password"
                      value={loginPin}
                      onChange={(e) => setLoginPin(e.target.value)}
                      className="w-full h-14 px-4 border border-slate-200 rounded-2xl outline-none focus:border-violet-400 focus:ring-4 focus:ring-violet-100 bg-white transition-all"
                      placeholder="PIN 입력"
                    />
                  </div>

                  {loginError && (
                    <div className="bg-red-50 border border-red-200 text-red-600 text-sm rounded-2xl px-4 py-3">
                      {loginError}
                    </div>
                  )}

                  <button type="submit" className="w-full h-14 rounded-2xl bg-gradient-to-r from-violet-700 to-purple-600 hover:from-violet-800 hover:to-purple-700 text-white font-bold tracking-tight shadow-lg shadow-violet-200 transition-all">
                    로그인
                  </button>
                </form>

                <div className="mt-6 rounded-2xl bg-slate-50 border border-slate-200 p-4 text-sm text-slate-500 leading-6">
                  현재 teachers 컬렉션에 등록된 선생님이 자동으로 목록에 표시됩니다.
                </div>
              </div>
            </div>
          </div>
        );
      }

      return (
        <div className="app-shell font-sans text-slate-800 print:bg-white print:m-0 print:p-0">
          <aside className="desktop-sidebar fixed left-6 top-6 bottom-6 w-[280px] rounded-[32px] bg-white/92 backdrop-blur-xl soft-border sidebar-shadow p-6 print:hidden">
            <div className="flex items-center gap-3 pb-6 border-b border-slate-100">
              {!logoError ? (
                <img src="logo.png" alt="열린학원 로고" className="h-10 w-auto object-contain" onError={() => setLogoError(true)} />
              ) : (
                <div className="h-10 w-10 rounded-2xl bg-violet-100 text-violet-700 flex items-center justify-center"><i className="fas fa-school"></i></div>
              )}
              <div>
                <div className="text-lg font-black tracking-tight text-violet-700">열린학원</div>
                <div className="text-xs text-slate-400">Academic Curator</div>
              </div>
            </div>

            <div className="mt-8 space-y-2">
              <button onClick={() => setView('dashboard')} className={`w-full flex items-center gap-3 rounded-2xl px-4 py-3 text-sm font-semibold transition-all ${view === 'dashboard' ? 'nav-pill-active' : 'nav-pill'}`}>
                <i className="fas fa-chart-line w-4"></i><span>Dashboard</span>
              </button>
              <button onClick={() => setView('manage')} className={`w-full flex items-center gap-3 rounded-2xl px-4 py-3 text-sm font-semibold transition-all ${view === 'manage' ? 'nav-pill-active' : 'nav-pill'}`}>
                <i className="fas fa-pen-to-square w-4"></i><span>Score Entry</span>
              </button>
            </div>

            <div className="mt-8 rounded-3xl hero-gradient soft-border p-5">
              <div className="text-xs font-semibold tracking-[0.18em] text-violet-700 uppercase">Current Teacher</div>
              <div className="mt-3 text-xl font-black text-slate-900">{currentTeacher?.name || '알수없음'}</div>
              <div className="mt-1 text-sm text-slate-500">PIN 기반 빠른 로그인</div>
            </div>

            <div className="mt-auto absolute bottom-6 left-6 right-6">
              <button onClick={handleLogout} className="w-full rounded-2xl bg-gradient-to-r from-violet-700 to-purple-600 text-white font-bold py-3 shadow-lg shadow-violet-200">
                로그아웃
              </button>
            </div>
          </aside>

          <div className="content-wrap lg:pl-[332px]">
            <header className="sticky top-0 z-20 bg-[#f6f7fb]/88 backdrop-blur-xl border-b border-slate-200/80 print:hidden">
              <div className="px-4 sm:px-6 lg:px-10 py-5 flex items-center justify-between gap-4">
                <div>
                  <div className="text-sm font-semibold text-violet-700">Academic Curator</div>
                  <h1 className="mt-1 text-2xl sm:text-3xl font-black tracking-tight text-slate-900">
                    {view === 'dashboard' ? 'Score Analysis Dashboard' : 'Score Entry Workspace'}
                  </h1>
                  <p className="mt-1 text-sm text-slate-500">
                    {view === 'dashboard' ? '학교별 · 과목별 성적 흐름을 한눈에 확인하세요.' : '학생 성적을 빠르고 정확하게 입력하세요.'}
                  </p>
                </div>

                <div className="flex items-center gap-2 sm:gap-3">
                  <button onClick={() => setView('dashboard')} className={`rounded-2xl px-4 py-2.5 text-sm font-semibold transition-all ${view === 'dashboard' ? 'bg-white text-violet-700 shadow-sm soft-border' : 'text-slate-500 hover:bg-white'}`}>
                    Dashboard
                  </button>
                  <button onClick={() => setView('manage')} className={`rounded-2xl px-4 py-2.5 text-sm font-semibold transition-all ${view === 'manage' ? 'bg-white text-violet-700 shadow-sm soft-border' : 'text-slate-500 hover:bg-white'}`}>
                    Score Entry
                  </button>
                  <div className="hidden sm:flex items-center gap-3 rounded-2xl bg-white px-4 py-2.5 soft-border shadow-sm">
                    <div className="h-9 w-9 rounded-full bg-violet-100 text-violet-700 flex items-center justify-center font-bold">
                      {(currentTeacher?.name || '?').slice(0,1)}
                    </div>
                    <div className="text-sm">
                      <div className="font-bold text-slate-800">{currentTeacher?.name || '-'}</div>
                      <div className="text-slate-400 text-xs">Teacher</div>
                    </div>
                  </div>
                </div>
              </div>
            </header>

            <main className="px-4 sm:px-6 lg:px-10 py-8 space-y-6 print:py-0 print:max-w-full">
            {view === 'dashboard' ? (
              <div className="space-y-6 print:space-y-4">
                <div className="bg-white/90 backdrop-blur-sm p-5 rounded-3xl shadow-lg shadow-slate-100 border border-white print:hidden flex flex-col gap-4">
                  <div className="flex justify-between items-center border-b pb-2">
                    <div className="flex items-center space-x-2 text-indigo-700 font-semibold">
                      <i className="fas fa-filter text-xl"></i><span>대시보드 분석 기준</span>
                    </div>
                    <button onClick={resetFilters} className="flex items-center space-x-1 text-sm text-slate-600 hover:text-indigo-700 transition-colors bg-slate-100 hover:bg-indigo-50 px-3 py-2 rounded-full border border-slate-200">
                      <i className="fas fa-sync-alt text-base"></i><span>필터 초기화</span>
                    </button>
                  </div>

                  <div className="flex flex-wrap gap-4 items-end">
                    <div className="flex-1 min-w-[120px]">
                      <label className="block text-xs font-medium text-slate-500 mb-1">연도</label>
                      <select name="year" value={filters.year} onChange={handleFilterChange} className="w-full border border-slate-200 rounded-2xl p-2.5 text-sm bg-slate-50/70 focus:ring-4 focus:ring-indigo-100 focus:border-indigo-400 outline-none transition-all">
                        {YEARS.map((y) => <option key={y} value={y}>{y}년</option>)}
                      </select>
                    </div>
                    <div className="flex-1 min-w-[140px]">
                      <label className="block text-xs font-medium text-slate-500 mb-1">시험</label>
                      <select name="exam" value={filters.exam} onChange={handleFilterChange} className="w-full border border-slate-200 rounded-2xl p-2.5 text-sm bg-slate-50/70 focus:ring-4 focus:ring-indigo-100 focus:border-indigo-400 outline-none transition-all">
                        {EXAMS.map((e) => <option key={e} value={e}>{e}</option>)}
                      </select>
                    </div>
                    <div className="flex-1 min-w-[140px]">
                      <label className="block text-xs font-medium text-slate-500 mb-1">학교</label>
                      <select name="school" value={filters.school} onChange={handleFilterChange} className="w-full border border-slate-200 rounded-2xl p-2.5 text-sm bg-slate-50/70 focus:ring-4 focus:ring-indigo-100 focus:border-indigo-400 outline-none transition-all">
                        {schools.map((s) => <option key={s} value={s}>{s}</option>)}
                      </select>
                    </div>
                    <div className="flex-1 min-w-[100px]">
                      <label className="block text-xs font-medium text-slate-500 mb-1">학년</label>
                      <select name="grade" value={filters.grade} onChange={handleFilterChange} className="w-full border border-slate-200 rounded-2xl p-2.5 text-sm bg-slate-50/70 focus:ring-4 focus:ring-indigo-100 focus:border-indigo-400 outline-none transition-all">
                        <option value="전체">전체</option>
                        {GRADES.map((g) => <option key={g} value={g}>{g}학년</option>)}
                      </select>
                    </div>
                    <div className="flex-1 min-w-[140px]">
                      <label className="block text-xs font-medium text-slate-500 mb-1">학원반(전체)</label>
                      <select name="className" value={filters.className} onChange={handleFilterChange} className="w-full border border-slate-200 rounded-2xl p-2.5 text-sm bg-slate-50/70 focus:ring-4 focus:ring-indigo-100 focus:border-indigo-400 outline-none transition-all">
                        {classNames.map((c) => <option key={c} value={c}>{c}</option>)}
                      </select>
                    </div>
                  </div>

                  <div className="pt-2 flex flex-wrap gap-2 items-center">
                    <span className="text-xs font-medium text-slate-500 mr-2">조회 과목:</span>
                    {['전체', ...SUBJECTS].map((sub) => (
                      <button key={sub} onClick={() => setActiveSubject(sub)} className={`px-5 py-2.5 rounded-full text-sm font-bold transition-all border ${activeSubject === sub ? `ring-2 ring-offset-1 shadow-md ${SUBJECT_COLORS[sub]}` : 'bg-white text-slate-500 border-slate-200 hover:bg-slate-50'}`}>
                        {sub}
                      </button>
                    ))}
                  </div>
                </div>

                <div className="flex justify-between items-center print:hidden">
                  <div className="text-sm font-medium text-emerald-700 bg-white px-3 py-2 rounded-full border border-emerald-100 shadow-sm">
                    <i className="fas fa-cloud-check mr-2"></i> 클라우드 동기화 완료
                  </div>
                  <button onClick={() => window.print()} className="flex items-center space-x-2 bg-white hover:bg-slate-50 text-slate-700 px-4 py-2 rounded-full font-semibold transition-colors shadow-sm border border-slate-200">
                    <i className="fas fa-print text-base"></i><span>보고서 출력하기</span>
                  </button>
                </div>

                <div className="grid grid-cols-1 md:grid-cols-2 gap-6 print:grid-cols-2">
                  <div className="bg-white/90 backdrop-blur-sm p-6 rounded-3xl shadow-lg shadow-slate-100 border border-white flex items-center space-x-5">
                    <div className="p-4 bg-blue-100 text-blue-600 rounded-xl"><i className="fas fa-users text-4xl"></i></div>
                    <div>
                      <p className="text-sm font-medium text-slate-500 mb-1">조회된 성적 건수</p>
                      <p className="text-3xl font-extrabold text-slate-800">{filteredDashboardData.length}건</p>
                    </div>
                  </div>
                  <div className="bg-white/90 backdrop-blur-sm p-6 rounded-3xl shadow-lg shadow-slate-100 border border-white flex items-center space-x-5">
                    <div className="p-4 bg-emerald-100 text-emerald-600 rounded-xl"><i className="fas fa-chart-line text-4xl"></i></div>
                    <div>
                      <p className="text-sm font-medium text-slate-500 mb-1">평균 점수</p>
                      <p className="text-3xl font-extrabold text-slate-800">
                        {filteredDashboardData.length > 0 ? (filteredDashboardData.reduce((acc, curr) => acc + Number(curr.score || 0), 0) / filteredDashboardData.length).toFixed(1) : 0}점
                      </p>
                    </div>
                  </div>
                </div>

                <div className="bg-white/90 backdrop-blur-sm p-6 rounded-3xl shadow-lg shadow-slate-100 border border-white print:break-inside-avoid">
                  <h3 className="text-lg font-bold text-slate-800 mb-4 border-b pb-2">입력 등급별 분포 현황</h3>
                  <div className="flex items-end h-56 space-x-2 pt-4">
                    {[1,2,3,4,5,6,7,8,9].map((grade) => {
                      const count = gradeDistribution[grade] || 0;
                      const maxCount = Math.max(...Object.values(gradeDistribution), 1);
                      const heightPercent = (count / maxCount) * 100;
                      return (
                        <div key={grade} className="flex-1 flex flex-col items-center justify-end group relative">
                          {count > 0 && <span className="text-sm font-bold text-indigo-600 mb-1 opacity-100 transition-opacity absolute -top-6 print:text-black">{count}명</span>}
                          <div className={`w-full max-w-[50px] rounded-t-md transition-all duration-500 ease-out print:border print:border-slate-800 ${grade <= 3 ? 'bg-indigo-500 print:bg-slate-400' : 'bg-slate-200 hover:bg-slate-300 print:bg-slate-100'}`} style={{ height: `${Math.max(heightPercent, count > 0 ? 5 : 0)}%` }}></div>
                          <span className="text-sm font-medium text-slate-600 mt-3 whitespace-nowrap">{grade}등급</span>
                        </div>
                      );
                    })}
                  </div>
                </div>

                <div className="bg-white/90 backdrop-blur-sm rounded-3xl shadow-lg shadow-slate-100 border border-white overflow-hidden print:border-none print:shadow-none print:break-inside-avoid">
                  <div className="p-5 bg-gradient-to-r from-slate-50 to-indigo-50/70 border-b border-slate-100 flex justify-between items-center print:bg-white print:border-b-2 print:border-slate-800 print:p-2">
                    <h3 className="font-bold text-slate-800">상세 명단 및 성적</h3>
                    <span className="text-xs text-slate-500 bg-white px-2 py-1 rounded border print:hidden">열 제목을 클릭하여 정렬</span>
                  </div>
                  <div className="overflow-x-auto">
                    <table className="w-full text-sm text-left border-collapse">
                      <thead className="bg-slate-50 text-slate-500 uppercase text-[11px] font-bold tracking-wider print:bg-slate-100 print:text-black">
                        <tr>
                          {[{key:'school', label:'학교'}, {key:'grade', label:'학년'}, {key:'className', label:'과목별 학원반'}, {key:'name', label:'이름'}, {key:'subject', label:'과목(세부)'}, {key:'score', label:'원점수'}, {key:'tier', label:'등급'}, {key:'updatedBy', label:'최종수정'}].map((col) => (
                            <th key={col.key} onClick={() => setDashboardSort({ key: col.key, direction: dashboardSort.direction === 'asc' ? 'desc' : 'asc' })} className="px-4 py-3 text-center cursor-pointer hover:bg-slate-200 transition-colors whitespace-nowrap border-b print:border-slate-300">
                              <div className="flex items-center justify-center space-x-1">
                                <span>{col.label}</span><i className="fas fa-sort text-xs text-slate-400 print:hidden"></i>
                              </div>
                            </th>
                          ))}
                        </tr>
                      </thead>
                      <tbody className="divide-y divide-slate-200">
                        {sortedDashboardData.length > 0 ? sortedDashboardData.map((row) => (
                          <tr key={row.docId} className="hover:bg-indigo-50/40 transition-colors">
                            <td className="px-4 py-3 text-center whitespace-nowrap">{row.school}</td>
                            <td className="px-4 py-3 text-center whitespace-nowrap">{row.grade}학년</td>
                            <td className="px-4 py-3 text-center whitespace-nowrap text-slate-500">{row.className || '-'}</td>
                            <td className="px-4 py-3 text-center whitespace-nowrap font-medium text-slate-800">{row.name}</td>
                            <td className="px-4 py-3 text-center whitespace-nowrap">{row.subject} {row.detailSubject && <span className="text-xs font-bold text-indigo-500">({row.detailSubject})</span>}</td>
                            <td className="px-4 py-3 text-center whitespace-nowrap font-bold text-indigo-600 print:text-black">{row.score}점</td>
                            <td className="px-4 py-3 text-center whitespace-nowrap"><span className={`px-3 py-1 rounded-full text-xs font-bold print:border print:bg-white print:text-black ${row.tier <= 3 ? 'bg-blue-100 text-blue-700' : 'bg-slate-100 text-slate-700'}`}>{row.tier}등급</span></td>
                            <td className="px-4 py-3 text-center whitespace-nowrap text-slate-500">{row.updatedBy || '-'}</td>
                          </tr>
                        )) : (
                          <tr><td colSpan="8" className="px-4 py-8 text-center text-slate-500 border-b print:border-slate-300">데이터가 없습니다.</td></tr>
                        )}
                      </tbody>
                    </table>
                  </div>
                </div>
              </div>
            ) : (
              <div className="space-y-6">
                <div className="bg-white p-5 rounded-3xl shadow-lg shadow-indigo-50 border border-indigo-100 flex flex-col gap-4 relative overflow-hidden">
                  <div className="absolute top-0 right-0 w-32 h-32 bg-indigo-50 rounded-bl-full -z-10"></div>
                  <div className="flex items-center space-x-2 text-indigo-700 font-bold border-b pb-2">
                    <i className="fas fa-user-graduate text-xl"></i><span>학생 선택 및 기본 정보 (필수입력)</span>
                  </div>

                  <div className="flex flex-wrap gap-4 items-end">
                    <div className="flex-1 min-w-[100px]">
                      <label className="block text-xs font-bold text-slate-600 mb-1">연도</label>
                      <select name="year" value={manageStudent.year} onChange={handleManageStudentChange} className="w-full border-2 border-indigo-100 rounded-md p-2.5 text-sm font-semibold focus:ring-2 focus:ring-indigo-500 outline-none transition-all">
                        {YEARS.map((y) => <option key={y} value={y}>{y}년</option>)}
                      </select>
                    </div>
                    <div className="flex-[2] min-w-[180px] relative">
                      <label className="block text-xs font-bold text-indigo-600 mb-1"><i className="fas fa-search mr-1"></i>학생 이름 검색/입력</label>
                      <input type="text" name="name" list="student-list" value={manageStudent.name} onChange={handleManageStudentChange} placeholder="이름을 입력하세요" autoComplete="off" className="w-full border-2 border-indigo-200 bg-indigo-50/50 rounded-md p-2.5 text-sm font-bold focus:ring-2 focus:ring-indigo-500 focus:bg-white outline-none transition-all" />
                      <datalist id="student-list">
                        {uniqueStudentNames.map((name) => <option key={name} value={name} />)}
                      </datalist>
                    </div>
                    <div className="flex-1 min-w-[150px]">
                      <label className="block text-xs font-bold text-slate-600 mb-1">소속 학교</label>
                      <input type="text" name="school" value={manageStudent.school} onChange={handleManageStudentChange} placeholder="예: 문산고" className="w-full border border-slate-300 rounded-md p-2.5 text-sm focus:ring-2 focus:ring-indigo-500 outline-none" />
                    </div>
                    <div className="flex-1 min-w-[100px]">
                      <label className="block text-xs font-bold text-slate-600 mb-1">학년</label>
                      <select name="grade" value={manageStudent.grade} onChange={handleManageStudentChange} className="w-full border border-slate-300 rounded-md p-2.5 text-sm focus:ring-2 focus:ring-indigo-500 outline-none">
                        {GRADES.map((g) => <option key={g} value={g}>{g}학년</option>)}
                      </select>
                    </div>
                  </div>
                  <p className="text-xs text-slate-400"><i className="fas fa-info-circle"></i> 입력/수정/삭제 이력이 선생님 이름으로 기록됩니다.</p>
                </div>

                <div className={`transition-opacity duration-500 ${manageStudent.name && manageStudent.school ? 'opacity-100' : 'opacity-40 pointer-events-none'}`}>
                  <div className="bg-white rounded-3xl shadow-lg shadow-slate-100 border border-slate-200 overflow-hidden">
                    <div className="p-4 bg-gradient-to-r from-slate-800 to-slate-700 text-white flex justify-between items-center">
                      <h3 className="font-bold"><span className="text-amber-400">{manageStudent.name || '???'}</span> 학생 성적 보드</h3>
                      <span className="text-xs text-slate-300">칸을 클릭하여 여러 과목을 자유롭게 추가/수정하세요</span>
                    </div>
                    <div className="overflow-x-auto p-4">
                      <table className="w-full text-sm text-left border-collapse border border-slate-300">
                        <thead className="bg-slate-100">
                          <tr>
                            <th className="border border-slate-300 px-4 py-3 text-center font-bold text-slate-700 w-32 bg-slate-200">시험 구분</th>
                            {SUBJECTS.map((col) => (
                              <th key={col} className={`border border-slate-300 px-4 py-3 text-center font-bold ${SUBJECT_COLORS[col].split(' ')[0]}`}>{col}</th>
                            ))}
                          </tr>
                        </thead>
                        <tbody>
                          {EXAMS.map((exam) => (
                            <tr key={exam}>
                              <td className="border border-slate-300 px-4 py-3 text-center font-bold bg-slate-50 text-slate-700 whitespace-nowrap">{exam}</td>
                              {SUBJECTS.map((subject) => {
                                const cellScores = currentStudentData.filter((d) => d.exam === exam && d.subject === subject);
                                return (
                                  <td key={subject} className="border border-slate-300 p-2 align-top h-28 relative group w-[20%] hover:bg-slate-50 transition-colors">
                                    <div className="space-y-2 mb-8">
                                      {cellScores.map((record) => (
                                        <div key={record.docId} onClick={() => openScoreModal(exam, subject, record)} className="bg-white border border-indigo-200 shadow-sm p-2 rounded-md cursor-pointer hover:border-indigo-500 hover:shadow transition-all relative overflow-hidden">
                                          <div className="absolute left-0 top-0 bottom-0 w-1 bg-indigo-500"></div>
                                          <div className="font-bold text-indigo-800 text-xs pl-2">{subject} {record.detailSubject && <span className="text-indigo-500">({record.detailSubject})</span>}</div>
                                          <div className="flex justify-between items-end mt-1 pl-2">
                                            <span className="text-lg font-black text-slate-700">{record.score}<span className="text-xs font-normal text-slate-500">점</span></span>
                                            <span className="text-sm font-bold text-red-500">{record.tier}<span className="text-xs font-normal">등급</span></span>
                                          </div>
                                          <div className="text-[10px] text-slate-400 mt-1 pl-2 truncate">{record.className || '-'} / {record.updatedBy || '-'}</div>
                                        </div>
                                      ))}
                                    </div>

                                    <button onClick={() => openScoreModal(exam, subject)} className={`absolute bottom-2 left-1/2 -translate-x-1/2 w-[80%] py-1.5 text-xs font-bold rounded flex items-center justify-center space-x-1 transition-all ${cellScores.length > 0 ? 'opacity-0 group-hover:opacity-100 bg-indigo-100 text-indigo-600 hover:bg-indigo-200' : 'bg-slate-100 text-slate-400 hover:bg-indigo-100 hover:text-indigo-600'}`}>
                                      <i className="fas fa-plus"></i> <span>과목 추가</span>
                                    </button>
                                  </td>
                                );
                              })}
                            </tr>
                          ))}
                        </tbody>
                      </table>
                    </div>
                  </div>
                </div>
              </div>
            )}
            </main>
          </div>

          {modal.isOpen && (
            <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/50 backdrop-blur-sm p-4 print:hidden">
              <div className="bg-white rounded-2xl shadow-2xl w-full max-w-md overflow-hidden transform transition-all">
                <div className="bg-indigo-600 p-4 flex justify-between items-center text-white">
                  <h3 className="font-bold text-lg"><i className="fas fa-edit mr-2"></i>{modalForm.exam} - {modalForm.subject} 성적 {modal.mode === 'edit' ? '수정' : '입력'}</h3>
                  <button onClick={() => setModal({isOpen:false, mode:'add'})} className="text-indigo-200 hover:text-white transition-colors"><i className="fas fa-times text-xl"></i></button>
                </div>

                <form onSubmit={handleModalSubmit} className="p-6 space-y-4">
                  <div>
                    <label className="block text-sm font-bold text-slate-700 mb-1">세부 과목명 <span className="text-xs font-normal text-slate-400">(선택)</span></label>
                    <input type="text" name="detailSubject" value={modalForm.detailSubject} onChange={handleModalFormChange} placeholder="예: 화학1, 기하, 미적분 등" className="w-full border border-slate-300 rounded-md p-2.5 text-sm focus:ring-2 focus:ring-indigo-500 outline-none" />
                  </div>

                  <div>
                    <label className="block text-sm font-bold text-slate-700 mb-1">과목별 학원반 <span className="text-xs font-normal text-slate-400">(선택)</span></label>
                    <input type="text" name="className" list="class-list" value={modalForm.className} onChange={handleModalFormChange} placeholder="예: SKY반" autoComplete="off" className="w-full border border-slate-300 rounded-md p-2.5 text-sm focus:ring-2 focus:ring-indigo-500 outline-none" />
                    <datalist id="class-list">
                      {classNames.filter((c) => c !== '전체').map((c) => <option key={c} value={c} />)}
                    </datalist>
                  </div>

                  <div className="grid grid-cols-2 gap-4 pt-2">
                    <div>
                      <label className="block text-sm font-bold text-slate-700 mb-1 text-center">원점수</label>
                      <input type="number" name="score" value={modalForm.score} onChange={handleModalFormChange} required min="0" max="100" placeholder="0~100" className="w-full border-2 border-slate-200 bg-slate-50 rounded-md p-3 text-center text-lg font-bold focus:ring-2 focus:ring-indigo-500 focus:bg-white outline-none" />
                    </div>
                    <div>
                      <label className="block text-sm font-bold text-indigo-600 mb-1 text-center">산출 등급</label>
                      <input type="number" name="tier" value={modalForm.tier} onChange={handleModalFormChange} required min="1" max="9" placeholder="1~9" className="w-full border-2 border-indigo-200 bg-indigo-50 rounded-md p-3 text-center text-lg font-bold text-indigo-700 focus:ring-2 focus:ring-indigo-500 focus:bg-white outline-none" />
                    </div>
                  </div>

                  <div className="text-xs text-slate-500 bg-slate-50 border rounded-lg p-3">
                    <div><b>입력자:</b> {currentTeacher?.name || '-'}</div>
                    {modal.mode === 'edit' && <div className="mt-1"><b>최종수정자:</b> {modalForm.updatedBy || '-'}</div>}
                  </div>

                  <div className="pt-6 flex gap-2">
                    {modal.mode === 'edit' && (
                      <button type="button" onClick={handleRecordDelete} className="px-4 py-3 bg-red-100 hover:bg-red-200 text-red-600 font-bold rounded-lg transition-colors">
                        <i className="fas fa-trash-alt"></i>
                      </button>
                    )}
                    <button type="submit" className="flex-1 py-3 bg-indigo-600 hover:bg-indigo-700 text-white font-bold rounded-lg transition-colors flex items-center justify-center space-x-2 shadow-md">
                      <i className="fas fa-check"></i> <span>{modal.mode === 'edit' ? '수정 완료' : '성적 추가하기'}</span>
                    </button>
                  </div>
                </form>
              </div>
            </div>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
