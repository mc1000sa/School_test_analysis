<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>열린학원 성적분석 시스템 (클라우드 저장)</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- FontAwesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <!-- React & ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

  <!-- Babel -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-50">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useMemo, useEffect } = React;

    // --- 브라우저 호환성을 위한 동적 모듈 로더 (에러 해결용) ---
    const nativeImport = new Function('modulePath', 'return import(modulePath)');

    // --- 설정 데이터 ---
    const EXAMS = ['1학기 중간고사', '1학기 기말고사', '2학기 중간고사', '2학기 기말고사'];
    const SUBJECTS = ['국어', '영어', '수학', '과학'];
    const GRADES = [1, 2, 3];
    const YEARS = [2026, 2027, 2028];

    const SUBJECT_COLORS = {
      '전체': 'bg-slate-100 text-slate-700 hover:bg-slate-200 border-slate-300',
      '국어': 'bg-pink-100 text-pink-700 hover:bg-pink-200 border-pink-300',
      '영어': 'bg-orange-100 text-orange-700 hover:bg-orange-200 border-orange-300',
      '수학': 'bg-blue-100 text-blue-700 hover:bg-blue-200 border-blue-300',
      '과학': 'bg-emerald-100 text-emerald-700 hover:bg-emerald-200 border-emerald-300',
    };

    function OpenAcademyAnalysis() {
      // --- 클라우드(Firebase) 연결 상태 관리 ---
      const [db, setDb] = useState(null);
      const [user, setUser] = useState(null);
      const [isLoading, setIsLoading] = useState(true); // 데이터 로딩 상태
      const [initError, setInitError] = useState(''); // 에러 상세 메시지 상태 (새로 추가됨)
      const [data, setData] = useState([]); // 초기 데이터는 빈 배열 (클라우드에서 불러옴)

      const [view, setView] = useState('dashboard');
      const [logoError, setLogoError] = useState(false);
      
      const [filters, setFilters] = useState({
        year: 2026, exam: '1학기 중간고사', school: '전체', grade: '전체', className: '전체',
      });
      const [activeSubject, setActiveSubject] = useState('전체');

      const [dashboardSort, setDashboardSort] = useState({ key: 'score', direction: 'desc' });
      const [manageSort, setManageSort] = useState({ key: 'docId', direction: 'desc' });

      // id 대신 클라우드 고유키인 docId 사용
      const [formData, setFormData] = useState({
        docId: null, year: 2026, exam: '1학기 중간고사', school: '', grade: 1, className: '', subject: '수학', name: '', score: '', tier: ''
      });
      const [isEditing, setIsEditing] = useState(false);

      // 1. 구글 클라우드(Firebase) 초기 세팅 및 로그인
      useEffect(() => {
        const initFirebase = async () => {
          try {
            const { initializeApp } = await nativeImport("https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js");
            const { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } = await nativeImport("https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js");
            const { getFirestore } = await nativeImport("https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js");

            let firebaseConfig;
            if (typeof __firebase_config !== 'undefined') {
              firebaseConfig = JSON.parse(__firebase_config);
            } else {
              // ★ 문채 선생님의 실제 키가 적용된 부분 ★
              firebaseConfig = {
                apiKey: "AIzaSyCAT_dBqH8QHwJG-E1vNkWlBiyzRx8y-Ac",
                authDomain: "open-school-3f74c.firebaseapp.com",
                projectId: "open-school-3f74c"
              };
            }

            // 키가 비정상일 경우 (초기 세팅 전)
            if (!firebaseConfig.apiKey || firebaseConfig.apiKey.includes('학원_API_KEY')) {
                if(typeof __firebase_config === 'undefined') {
                   setIsLoading(false);
                   return;
                }
            }

            const app = initializeApp(firebaseConfig);
            const auth = getAuth(app);
            const database = getFirestore(app);
            setDb(database);

            // 데이터베이스 접근 권한 인증
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
              await signInWithCustomToken(auth, __initial_auth_token);
            } else {
              await signInAnonymously(auth); // 여기서 Firebase Authentication '익명' 권한이 필요합니다!
            }

            onAuthStateChanged(auth, (u) => {
              setUser(u);
            });
          } catch (error) {
            console.error("클라우드 연결 오류:", error);
            setInitError(error.message); // 화면에 에러를 보여주기 위해 상태 업데이트
            setIsLoading(false);
          }
        };
        initFirebase();
      }, []);

      // 2. 클라우드에서 실시간으로 데이터 불러오기
      useEffect(() => {
        if (!user || !db) return;
        
        let unsubscribe;
        const fetchData = async () => {
           try {
             const { collection, onSnapshot } = await nativeImport("https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js");
             
             // 저장될 공간 이름 지정
             const colPath = typeof __app_id !== 'undefined' 
                ? `artifacts/${__app_id}/public/data/scores` 
                : `openacademy/data/scores`;

             const q = collection(db, colPath);
             
             unsubscribe = onSnapshot(q, (snapshot) => {
               const items = [];
               snapshot.forEach(doc => {
                 items.push({ docId: doc.id, ...doc.data() });
               });
               setData(items);
               setIsLoading(false);
             }, (error) => {
               console.error("데이터 가져오기 실패 (규칙 문제일 수 있음):", error);
               setInitError("데이터를 읽을 수 없습니다. Firestore 보안 규칙을 확인하세요: " + error.message);
               setIsLoading(false);
             });
           } catch(error) {
              setInitError(error.message);
              setIsLoading(false);
           }
        };
        fetchData();

        return () => {
            if(unsubscribe) unsubscribe();
        };
      }, [user, db]);


      const schools = ['전체', ...Array.from(new Set(data.map(d => d.school)))];
      const classNames = ['전체', ...Array.from(new Set(data.map(d => d.className)))];

      const resetFilters = () => {
        setFilters({ year: 2026, exam: '1학기 중간고사', school: '전체', grade: '전체', className: '전체' });
        setActiveSubject('전체');
      };

      const filteredData = useMemo(() => {
        return data.filter(item => {
          return (
            item.year === filters.year &&
            item.exam === filters.exam &&
            (filters.school === '전체' || item.school === filters.school) &&
            (filters.grade === '전체' || item.grade === Number(filters.grade)) &&
            (filters.className === '전체' || item.className === filters.className) &&
            (activeSubject === '전체' || item.subject === activeSubject)
          );
        });
      }, [data, filters, activeSubject]);

      const sortData = (dataArray, sortConfig) => {
        let sortableItems = [...dataArray];
        if (sortConfig.key !== null) {
          sortableItems.sort((a, b) => {
            let aValue = a[sortConfig.key];
            let bValue = b[sortConfig.key];
            if (typeof aValue === 'string') { aValue = aValue.toLowerCase(); bValue = bValue.toLowerCase(); }
            if (aValue < bValue) return sortConfig.direction === 'asc' ? -1 : 1;
            if (aValue > bValue) return sortConfig.direction === 'asc' ? 1 : -1;
            return 0;
          });
        }
        return sortableItems;
      };

      const sortedDashboardData = useMemo(() => sortData(filteredData, dashboardSort), [filteredData, dashboardSort]);
      const sortedManageData = useMemo(() => sortData(filteredData, manageSort), [filteredData, manageSort]);

      const gradeDistribution = useMemo(() => {
        const dist = {};
        filteredData.forEach(item => {
          const g = item.tier;
          if (g) dist[g] = (dist[g] || 0) + 1;
        });
        return dist;
      }, [filteredData]);

      const handleSort = (key, type = 'dashboard') => {
        if (type === 'dashboard') {
          setDashboardSort({ key, direction: (dashboardSort.key === key && dashboardSort.direction === 'asc') ? 'desc' : 'asc' });
        } else {
          setManageSort({ key, direction: (manageSort.key === key && manageSort.direction === 'asc') ? 'desc' : 'asc' });
        }
      };

      const handleFilterChange = (e) => {
        const { name, value } = e.target;
        setFilters(prev => ({ ...prev, [name]: name === 'year' || name === 'grade' ? (value === '전체' ? value : Number(value)) : value }));
      };

      const handleFormChange = (e) => {
        const { name, value } = e.target;
        setFormData(prev => ({ ...prev, [name]: (name === 'year' || name === 'grade' || name === 'score' || name === 'tier') ? Number(value) : value }));
      };

      // 3. 클라우드에 데이터 저장 및 수정 요청
      const handleSubmit = async (e) => {
        e.preventDefault();
        
        if(!db) {
            alert("클라우드 데이터베이스에 연결되지 않았습니다.");
            return;
        }

        try {
            const { addDoc, updateDoc, doc, collection } = await nativeImport("https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js");
            const colPath = typeof __app_id !== 'undefined' ? `artifacts/${__app_id}/public/data/scores` : `openacademy/data/scores`;
            
            const { docId, ...saveData } = formData;

            if (isEditing) {
                await updateDoc(doc(db, colPath, docId), saveData);
                setIsEditing(false);
            } else {
                await addDoc(collection(db, colPath), saveData);
            }
            
            setFormData(prev => ({ ...prev, docId: null, name: '', score: '', tier: '' }));
        } catch (error) {
            console.error("데이터 저장 오류:", error);
            alert("저장 중 오류가 발생했습니다: " + error.message);
        }
      };

      const editRecord = (item) => {
        setFormData(item);
        setIsEditing(true);
        setView('manage');
        window.scrollTo({ top: 0, behavior: 'smooth' }); 
      };

      // 4. 클라우드에서 데이터 삭제 요청
      const deleteRecord = async (docId) => {
        if (window.confirm('정말 이 학생의 성적을 삭제하시겠습니까? (클라우드에서 영구 삭제됩니다)')) {
            try {
                const { deleteDoc, doc } = await nativeImport("https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js");
                const colPath = typeof __app_id !== 'undefined' ? `artifacts/${__app_id}/public/data/scores` : `openacademy/data/scores`;
                await deleteDoc(doc(db, colPath, docId));
            } catch (error) {
                console.error("삭제 오류:", error);
                alert("삭제 중 오류가 발생했습니다.");
            }
        }
      };

      const cancelEdit = () => {
        setIsEditing(false);
        setFormData({ docId: null, year: filters.year, exam: filters.exam, school: '', grade: 1, className: '', subject: '수학', name: '', score: '', tier: '' });
      };

      // ★ 에러 발생 시 정확한 원인을 보여주는 화면 ★
      if (initError) {
          return (
            <div className="min-h-screen flex flex-col items-center justify-center bg-slate-50 p-6 text-center">
                <i className="fas fa-exclamation-triangle text-6xl text-red-400 mb-4"></i>
                <h2 className="text-2xl font-bold text-slate-800">연결 또는 권한 오류 발생</h2>
                <div className="bg-red-50 text-red-600 p-4 rounded-md mt-4 font-mono text-sm inline-block text-left max-w-2xl break-all">
                  {initError}
                </div>
                <p className="text-slate-600 mt-6 max-w-lg">
                    문채 선생님, 위 오류 메시지가 <b>auth/operation-not-allowed</b> 라면,<br/>
                    Firebase 콘솔에서 <b>[Authentication] -> [Sign-in method]</b> 탭으로 이동하여<br/>
                    <b>'익명(Anonymous)' 로그인을 사용 설정</b>해 주세요!<br/><br/>
                    또는 규칙(Rules) 오류라면, Firestore <b>[규칙(Rules)]</b> 탭에서 <code>allow read, write: if true;</code> 로 설정되었는지 확인해 주세요.
                </p>
            </div>
          );
      }

      // 클라우드 접속을 대기하는 동안 보여줄 로딩 화면
      if (isLoading) {
          return (
              <div className="min-h-screen flex flex-col items-center justify-center bg-slate-50">
                  <i className="fas fa-circle-notch fa-spin text-5xl text-indigo-600 mb-4"></i>
                  <h2 className="text-xl font-bold text-slate-800">열린학원 클라우드 시스템 접속 중...</h2>
                  <p className="text-slate-500 mt-2">데이터베이스를 동기화하고 있습니다.</p>
              </div>
          );
      }

      // 외부(GitHub) 접속 시, 설정값이 없어서 멈췄을 때 보여주는 안내 화면 (기존)
      if (!user && !db && typeof __firebase_config === 'undefined') {
          return (
            <div className="min-h-screen flex flex-col items-center justify-center bg-slate-50 p-6 text-center">
                <i className="fas fa-database text-6xl text-slate-300 mb-4"></i>
                <h2 className="text-2xl font-bold text-slate-800">클라우드 데이터베이스 설정 필요</h2>
                <p className="text-slate-600 mt-4 max-w-lg">
                    문채 선생님! 깃허브에서 시스템을 구동하시려면 학원 전용 클라우드 데이터베이스(Firebase) 주소를 소스코드 안에 입력해주셔야 합니다.
                </p>
            </div>
          );
      }

      return (
        <div className="min-h-screen bg-slate-50 font-sans text-slate-800 print:bg-white print:m-0 print:p-0">
          
          <header className="bg-indigo-700 text-white shadow-md print:hidden">
            <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4 flex flex-col sm:flex-row justify-between items-center gap-4">
              <div className="flex items-center space-x-3">
                {!logoError ? (
                  <img src="logo.png" alt="열린학원 로고" className="h-9 w-auto object-contain bg-white rounded p-1" onError={() => setLogoError(true)} />
                ) : (
                  <i className="fas fa-school text-3xl text-indigo-200"></i>
                )}
                <h1 className="text-2xl font-bold tracking-tight">문산 열린학원 <span className="text-indigo-200 font-light">성적 분석 시스템</span></h1>
              </div>
              <div className="flex space-x-2">
                <button onClick={() => setView('dashboard')} className={`px-4 py-2 rounded-md font-medium transition-colors ${view === 'dashboard' ? 'bg-white text-indigo-700' : 'bg-indigo-600 hover:bg-indigo-500 text-white'}`}>
                  대시보드 분석
                </button>
                <button onClick={() => setView('manage')} className={`px-4 py-2 rounded-md font-medium transition-colors ${view === 'manage' ? 'bg-white text-indigo-700' : 'bg-indigo-600 hover:bg-indigo-500 text-white'}`}>
                  성적 입력/수정
                </button>
              </div>
            </div>
          </header>

          <main className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 space-y-6 print:py-0 print:max-w-full">
            
            <div className="bg-white p-5 rounded-xl shadow-sm border border-slate-200 flex flex-col gap-4 print:hidden">
              <div className="flex justify-between items-center border-b pb-2">
                <div className="flex items-center space-x-2 text-indigo-700 font-semibold">
                  <i className="fas fa-filter text-xl"></i><span>분석 기준 설정</span>
                </div>
                <button onClick={resetFilters} className="flex items-center space-x-1 text-sm text-slate-500 hover:text-indigo-600 transition-colors bg-slate-100 hover:bg-indigo-50 px-3 py-1.5 rounded-md">
                  <i className="fas fa-sync-alt text-base"></i><span>필터 초기화</span>
                </button>
              </div>
              
              <div className="flex flex-wrap gap-4 items-end">
                <div className="flex-1 min-w-[120px]">
                  <label className="block text-xs font-medium text-slate-500 mb-1">연도</label>
                  <select name="year" value={filters.year} onChange={handleFilterChange} className="w-full border-slate-300 rounded-md shadow-sm focus:ring-indigo-500 focus:border-indigo-500 text-sm py-2 px-3 border">
                    {YEARS.map(y => <option key={y} value={y}>{y}년</option>)}
                  </select>
                </div>
                <div className="flex-1 min-w-[140px]">
                  <label className="block text-xs font-medium text-slate-500 mb-1">시험</label>
                  <select name="exam" value={filters.exam} onChange={handleFilterChange} className="w-full border-slate-300 rounded-md shadow-sm focus:ring-indigo-500 focus:border-indigo-500 text-sm py-2 px-3 border">
                    {EXAMS.map(e => <option key={e} value={e}>{e}</option>)}
                  </select>
                </div>
                <div className="flex-1 min-w-[140px]">
                  <label className="block text-xs font-medium text-slate-500 mb-1">학교</label>
                  <select name="school" value={filters.school} onChange={handleFilterChange} className="w-full border-slate-300 rounded-md shadow-sm focus:ring-indigo-500 focus:border-indigo-500 text-sm py-2 px-3 border">
                    {schools.map(s => <option key={s} value={s}>{s}</option>)}
                  </select>
                </div>
                <div className="flex-1 min-w-[100px]">
                  <label className="block text-xs font-medium text-slate-500 mb-1">학년</label>
                  <select name="grade" value={filters.grade} onChange={handleFilterChange} className="w-full border-slate-300 rounded-md shadow-sm focus:ring-indigo-500 focus:border-indigo-500 text-sm py-2 px-3 border">
                    <option value="전체">전체</option>
                    {GRADES.map(g => <option key={g} value={g}>{g}학년</option>)}
                  </select>
                </div>
                <div className="flex-1 min-w-[140px]">
                  <label className="block text-xs font-medium text-slate-500 mb-1">학원반</label>
                  <select name="className" value={filters.className} onChange={handleFilterChange} className="w-full border-slate-300 rounded-md shadow-sm focus:ring-indigo-500 focus:border-indigo-500 text-sm py-2 px-3 border">
                    {classNames.map(c => <option key={c} value={c}>{c}</option>)}
                  </select>
                </div>
              </div>

              <div className="pt-2 flex flex-wrap gap-2 items-center">
                <span className="text-xs font-medium text-slate-500 mr-2">조회 과목:</span>
                {['전체', ...SUBJECTS].map(sub => (
                  <button key={sub} onClick={() => setActiveSubject(sub)} className={`px-5 py-2 rounded-full text-sm font-bold transition-all border ${activeSubject === sub ? `ring-2 ring-offset-1 shadow-md ${SUBJECT_COLORS[sub]}` : 'bg-white text-slate-500 border-slate-200 hover:bg-slate-50'}`}>
                    {sub}
                  </button>
                ))}
              </div>
            </div>

            {view === 'dashboard' ? (
              <div className="space-y-6 print:space-y-4">
                
                <div className="hidden print:block text-center border-b-2 border-indigo-700 pb-4 mb-6">
                   <h2 className="text-3xl font-bold text-slate-800">{filters.year}년 {filters.exam} 성적 분석 보고서</h2>
                   <p className="text-slate-600 mt-2 font-medium">
                     [ 기준: {filters.school} / {filters.grade === '전체' ? '전학년' : `${filters.grade}학년`} / {filters.className} / {activeSubject} ]
                   </p>
                </div>

                <div className="flex justify-between items-center print:hidden">
                  <div className="text-sm font-medium text-emerald-600 bg-emerald-50 px-3 py-1.5 rounded-full border border-emerald-200">
                    <i className="fas fa-cloud-check mr-2"></i>클라우드 동기화 완료
                  </div>
                  <button onClick={() => window.print()} className="flex items-center space-x-2 bg-slate-800 hover:bg-slate-700 text-white px-4 py-2 rounded-md font-medium transition-colors shadow-sm">
                    <i className="fas fa-print text-base"></i><span>보고서 출력하기</span>
                  </button>
                </div>

                <div className="grid grid-cols-1 md:grid-cols-2 gap-6 print:grid-cols-2">
                  <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200 flex items-center space-x-5">
                    <div className="p-4 bg-blue-100 text-blue-600 rounded-xl"><i className="fas fa-users text-4xl"></i></div>
                    <div>
                      <p className="text-sm font-medium text-slate-500 mb-1">조회된 학생 수</p>
                      <p className="text-3xl font-extrabold text-slate-800">{filteredData.length}명</p>
                    </div>
                  </div>
                  <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200 flex items-center space-x-5">
                    <div className="p-4 bg-emerald-100 text-emerald-600 rounded-xl"><i className="fas fa-chart-line text-4xl"></i></div>
                    <div>
                      <p className="text-sm font-medium text-slate-500 mb-1">평균 점수</p>
                      <p className="text-3xl font-extrabold text-slate-800">
                        {filteredData.length > 0 ? (filteredData.reduce((acc, curr) => acc + curr.score, 0) / filteredData.length).toFixed(1) : 0}점
                      </p>
                    </div>
                  </div>
                </div>

                <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200 print:break-inside-avoid">
                  <h3 className="text-lg font-bold text-slate-800 mb-4 border-b pb-2">입력 등급별 분포 현황</h3>
                  <div className="flex items-end h-56 space-x-2 pt-4">
                    {[1,2,3,4,5,6,7,8,9].map(grade => {
                      const count = gradeDistribution[grade] || 0;
                      const maxCount = Math.max(...Object.values(gradeDistribution), 1);
                      const heightPercent = (count / maxCount) * 100;
                      return (
                        <div key={grade} className="flex-1 flex flex-col items-center justify-end group relative">
                          {count > 0 && <span className="text-sm font-bold text-indigo-600 mb-1 opacity-100 transition-opacity absolute -top-6 print:text-black">{count}명</span>}
                          <div className={`w-full max-w-[50px] rounded-t-md transition-all duration-500 ease-out print:border print:border-slate-800 ${grade <= 3 ? 'bg-indigo-500 print:bg-slate-400' : 'bg-slate-200 hover:bg-slate-300 print:bg-slate-100'}`} style={{ height: `${Math.max(heightPercent, count > 0 ? 5 : 0)}%` }}></div>
                          <span className="text-sm font-medium text-slate-600 mt-3 whitespace-nowrap">{grade}등급</span>
                        </div>
                      );
                    })}
                  </div>
                </div>

                <div className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden print:border-none print:shadow-none print:break-inside-avoid">
                   <div className="p-4 bg-slate-50 border-b border-slate-200 flex justify-between items-center print:bg-white print:border-b-2 print:border-slate-800 print:p-2">
                      <h3 className="font-bold text-slate-800">상세 명단 및 성적</h3>
                      <span className="text-xs text-slate-500 bg-white px-2 py-1 rounded border print:hidden">열 제목을 클릭하여 정렬</span>
                   </div>
                   <div className="overflow-x-auto">
                    <table className="w-full text-sm text-left border-collapse">
                      <thead className="bg-slate-100 text-slate-600 uppercase text-xs font-semibold print:bg-slate-100 print:text-black">
                        <tr>
                          {[{key:'school', label:'학교'}, {key:'grade', label:'학년'}, {key:'className', label:'학원반'}, {key:'name', label:'이름'}, {key:'subject', label:'과목'}, {key:'score', label:'원점수'}, {key:'tier', label:'등급'}].map((col) => (
                            <th key={col.key} onClick={() => handleSort(col.key, 'dashboard')} className="px-4 py-3 text-center cursor-pointer hover:bg-slate-200 transition-colors whitespace-nowrap border-b print:border-slate-300">
                              <div className="flex items-center justify-center space-x-1">
                                <span>{col.label}</span><i className="fas fa-sort text-xs text-slate-400 print:hidden"></i>
                              </div>
                            </th>
                          ))}
                        </tr>
                      </thead>
                      <tbody className="divide-y divide-slate-200">
                        {sortedDashboardData.length > 0 ? sortedDashboardData.map((row) => (
                          <tr key={row.docId} className="hover:bg-slate-50 transition-colors">
                            <td className="px-4 py-3 text-center whitespace-nowrap">{row.school}</td>
                            <td className="px-4 py-3 text-center whitespace-nowrap">{row.grade}학년</td>
                            <td className="px-4 py-3 text-center whitespace-nowrap">{row.className}</td>
                            <td className="px-4 py-3 text-center whitespace-nowrap font-medium text-slate-800">{row.name}</td>
                            <td className="px-4 py-3 text-center whitespace-nowrap">{row.subject}</td>
                            <td className="px-4 py-3 text-center whitespace-nowrap font-bold text-indigo-600 print:text-black">{row.score}점</td>
                            <td className="px-4 py-3 text-center whitespace-nowrap">
                              <span className={`px-3 py-1 rounded-full text-xs font-bold print:border print:bg-white print:text-black ${row.tier <= 3 ? 'bg-blue-100 text-blue-700' : 'bg-slate-100 text-slate-700'}`}>{row.tier}등급</span>
                            </td>
                          </tr>
                        )) : (
                          <tr><td colSpan="7" className="px-4 py-8 text-center text-slate-500 border-b print:border-slate-300">데이터가 없습니다.</td></tr>
                        )}
                      </tbody>
                    </table>
                  </div>
                </div>
              </div>
            ) : (
              <div className="space-y-6">
                <div className={`bg-white p-6 rounded-xl shadow-sm border ${isEditing ? 'border-amber-400 ring-2 ring-amber-100' : 'border-indigo-200'}`}>
                  <div className="flex items-center justify-between mb-4 border-b pb-2">
                    <h3 className={`text-lg font-bold flex items-center ${isEditing ? 'text-amber-600' : 'text-indigo-700'}`}>
                      {isEditing ? <><i className="fas fa-pen text-xl mr-2"></i> 클라우드 데이터 수정</> : <><i className="fas fa-plus text-xl mr-2"></i> 클라우드에 새 성적 입력</>}
                    </h3>
                    {isEditing && (
                      <button onClick={cancelEdit} className="text-sm flex items-center text-slate-500 hover:text-slate-700"><i className="fas fa-times mr-1"></i> 취소</button>
                    )}
                  </div>
                  
                  <form onSubmit={handleSubmit} className="grid grid-cols-2 md:grid-cols-5 gap-4">
                    <div><label className="block text-xs font-medium text-slate-700 mb-1">연도</label><select name="year" value={formData.year} onChange={handleFormChange} required className="w-full border border-slate-300 rounded-md p-2 text-sm"><option value={2026}>2026년</option><option value={2027}>2027년</option><option value={2028}>2028년</option></select></div>
                    <div><label className="block text-xs font-medium text-slate-700 mb-1">시험</label><select name="exam" value={formData.exam} onChange={handleFormChange} required className="w-full border border-slate-300 rounded-md p-2 text-sm"><option value="1학기 중간고사">1학기 중간고사</option><option value="1학기 기말고사">1학기 기말고사</option><option value="2학기 중간고사">2학기 중간고사</option><option value="2학기 기말고사">2학기 기말고사</option></select></div>
                    <div><label className="block text-xs font-medium text-slate-700 mb-1">학교</label><input type="text" name="school" value={formData.school} onChange={handleFormChange} required placeholder="예: 문산고" className="w-full border border-slate-300 rounded-md p-2 text-sm" /></div>
                    <div><label className="block text-xs font-medium text-slate-700 mb-1">학년</label><select name="grade" value={formData.grade} onChange={handleFormChange} required className="w-full border border-slate-300 rounded-md p-2 text-sm"><option value={1}>1학년</option><option value={2}>2학년</option><option value={3}>3학년</option></select></div>
                    <div><label className="block text-xs font-medium text-slate-700 mb-1">학원반</label><input type="text" name="className" value={formData.className} onChange={handleFormChange} required placeholder="예: SKY반" className="w-full border border-slate-300 rounded-md p-2 text-sm" /></div>
                    <div><label className="block text-xs font-medium text-slate-700 mb-1">과목</label><select name="subject" value={formData.subject} onChange={handleFormChange} required className="w-full border border-slate-300 rounded-md p-2 text-sm"><option value="국어">국어</option><option value="영어">영어</option><option value="수학">수학</option><option value="과학">과학</option></select></div>
                    <div><label className="block text-xs font-medium text-slate-700 mb-1">학생 이름</label><input type="text" name="name" value={formData.name} onChange={handleFormChange} required placeholder="이름" className="w-full border border-slate-300 rounded-md p-2 text-sm" /></div>
                    <div><label className="block text-xs font-medium text-slate-700 mb-1">원점수</label><input type="number" name="score" value={formData.score} onChange={handleFormChange} required min="0" max="100" placeholder="0~100" className="w-full border border-slate-300 rounded-md p-2 text-sm" /></div>
                    <div><label className="block text-xs font-bold text-indigo-700 mb-1">산출 등급 (직접입력)</label><input type="number" name="tier" value={formData.tier} onChange={handleFormChange} required min="1" max="9" placeholder="1~9" className="w-full border-2 border-indigo-200 bg-indigo-50 rounded-md p-2 text-sm" /></div>
                    <div className="col-span-2 md:col-span-5 flex items-end">
                      <button type="submit" className={`w-full flex items-center justify-center space-x-2 text-white p-3 rounded-md font-bold transition-colors shadow-sm ${isEditing ? 'bg-amber-500 hover:bg-amber-600' : 'bg-indigo-600 hover:bg-indigo-700'}`}>
                        {isEditing ? <><i className="fas fa-cloud-upload-alt mr-2"></i><span>수정 정보 동기화</span></> : <><i className="fas fa-cloud-upload-alt mr-2"></i><span>클라우드에 저장</span></>}
                      </button>
                    </div>
                  </form>
                </div>

                <div className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                   <div className="p-4 bg-slate-50 border-b border-slate-200 flex justify-between items-center">
                      <h3 className="font-bold text-slate-800">전체 데이터 수정 및 목록</h3>
                      <span className="text-xs text-slate-500">현재 클라우드 조회: {sortedManageData.length}건</span>
                   </div>
                   <div className="overflow-x-auto">
                    <table className="w-full text-sm text-left">
                      <thead className="bg-slate-100 text-slate-600 uppercase text-xs font-semibold">
                        <tr>
                          {[{key:'year', label:'연도/시험'}, {key:'school', label:'학교/학년'}, {key:'subject', label:'반/과목'}, {key:'score', label:'이름/점수(등급)'}].map((col) => (
                            <th key={col.key} onClick={() => handleSort(col.key, 'manage')} className="px-4 py-3 text-center cursor-pointer hover:bg-slate-200 transition-colors whitespace-nowrap">
                              <div className="flex items-center justify-center space-x-1"><span>{col.label}</span><i className="fas fa-sort text-xs text-slate-400"></i></div>
                            </th>
                          ))}
                          <th className="px-4 py-3 text-center whitespace-nowrap text-indigo-600 font-bold">수정/삭제</th>
                        </tr>
                      </thead>
                      <tbody className="divide-y divide-slate-200">
                        {sortedManageData.length > 0 ? sortedManageData.map((row) => (
                          <tr key={row.docId} className="hover:bg-slate-50 transition-colors">
                            <td className="px-4 py-3 text-center whitespace-nowrap">{row.year} {row.exam}</td>
                            <td className="px-4 py-3 text-center whitespace-nowrap">{row.school} {row.grade}학년</td>
                            <td className="px-4 py-3 text-center whitespace-nowrap">{row.className} / {row.subject}</td>
                            <td className="px-4 py-3 text-center whitespace-nowrap">
                              <span className="font-bold">{row.name}</span> ({row.score}점 / <span className="text-indigo-600 font-bold">{row.tier}등급</span>)
                            </td>
                            <td className="px-4 py-3 text-center whitespace-nowrap">
                              <div className="flex items-center justify-center space-x-2">
                                <button onClick={() => editRecord(row)} className="text-indigo-600 hover:bg-indigo-50 p-1.5 rounded transition-colors border border-transparent hover:border-indigo-200" title="수정"><i className="fas fa-pen"></i></button>
                                <button onClick={() => deleteRecord(row.docId)} className="text-red-500 hover:bg-red-50 p-1.5 rounded transition-colors border border-transparent hover:border-red-200" title="삭제"><i className="fas fa-trash"></i></button>
                              </div>
                            </td>
                          </tr>
                        )) : (
                          <tr><td colSpan="5" className="px-4 py-8 text-center text-slate-500">클라우드에 데이터가 없습니다.</td></tr>
                        )}
                      </tbody>
                    </table>
                  </div>
                </div>

              </div>
            )}
          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<OpenAcademyAnalysis />);
  </script>
</body>
</html>
