      .print-avoid-break { break-inside: avoid; page-break-inside: avoid; }

잠시만 기다려주세요.</div>

  <script>
    (function(){
      var start = Date.now();
      var splash = document.getElementById('instantBootSplash');
      var desc = document.getElementById('instantBootDesc');
      function updateBootText(){
        if (!desc) return;
        var sec = Math.floor((Date.now() - start) / 1000);
        if (sec < 8) desc.textContent = '데이터를 안전하게 불러오는 중입니다.';
        else if (sec < 20) desc.textContent = '선생님과 학생 데이터를 차례대로 정리하고 있습니다.';
        else if (sec < 60) desc.textContent = '조금만 더 기다려주세요. 처음 접속한 기기에서는 준비 시간이 더 걸릴 수 있습니다.';
        else desc.textContent = '1분 이상 본 화면이 지속될 시 F5를 눌러서 새로고침 한 번만 해주세요.';
      }
      updateBootText();
      var timer = setInterval(updateBootText, 1000);
      window.__hideInstantBootSplash = function(){
        clearInterval(timer);
        if (!splash) return;
        splash.classList.add('hidden');
        setTimeout(function(){ if (splash && splash.parentNode) splash.parentNode.removeChild(splash); }, 450);
      };
      setTimeout(function(){
        if (splash && !splash.classList.contains('hidden')) {
          window.__hideInstantBootSplash();
        }
      }, 12000);
    })();
  </script>

  <script type="text/babel">
    const { useEffect, useMemo, useRef, useState } = React;

    const EXAMS = ['1학기 중간고사', '1학기 기말고사', '2학기 중간고사', '2학기 기말고사'];

    const SCHOOL_OPTIONS = ['수억고', '파주고', '문산고', '율곡고', '세경고', '파주여고', '삼광고'];
    const DEFAULT_SUBJECTS = ['국어', '영어', '수학', '과학'];
    const APP_VERSION = 'OA-R12.5';
    const DATA_BOOT_TIMEOUT_MS = 15000;
    const AUTO_LOGOUT_MS = 30 * 60 * 1000;
    const YEARS = [2026, 2027, 2028];
    const GRADES = [1, 2, 3];
    const SCORE_BUCKETS = [
      { label: '90-100', min: 90, max: 100 },

      { label: '70-79', min: 70, max: 79 },
      { label: '60-69', min: 60, max: 69 },
      { label: '0-59', min: 0, max: 59 },
    ];

    const MENU_ITEMS = [
      { key: 'dashboard', label: '전체성적 분석', icon: 'fa-chart-column' },
      { key: 'manage', label: '성적입력', icon: 'fa-pen-to-square' },
      { key: 'teacherAnalysis', label: '선생님별 성적분석', icon: 'fa-chalkboard-user' },
      { key: 'schoolAnalysis', label: '학교별 성적분석', icon: 'fa-school' },
      { key: 'studentAnalysis', label: '학생별 성적분석', icon: 'fa-user-graduate' },
      { key: 'teamExam', label: '시험 분석 아카이브', icon: 'fa-clipboard-list' },
    ];

    const ADMIN_TEACHER_NAME = '수최';
    const LOGIN_MAX_ATTEMPTS = 5;
    const LOGIN_LOCK_MINUTES = 30;
    const TEST_KEYWORDS = ['테스트', 'test', 'sample', '샘플', 'demo', '임시', 'tmp', 'temp', '가짜'];

    function normalizeTeacherRole(value) {
      const role = String(value || '').trim().toLowerCase();
      if (role === 'admin' || role === 'guest' || role === 'teacher') return role;
      return '';
    }

    function getTeacherRole(target) {
      if (target && typeof target === 'object') {
        const savedRole = normalizeTeacherRole(target.teacherRole);
        if (savedRole) return savedRole;
        const savedName = String(target.name || '').trim();
        if (savedName === ADMIN_TEACHER_NAME) return 'admin';
        if (savedName === '손님') return 'guest';
        return 'teacher';
      }
      const name = String(target || '').trim();
      if (name === ADMIN_TEACHER_NAME) return 'admin';
      if (name === '손님') return 'guest';
      return 'teacher';
    }

    function getTeacherRoleLabel(role) {
      const normalized = normalizeTeacherRole(role) || 'teacher';
      if (normalized === 'admin') return '관리자';
      if (normalized === 'guest') return '손님';
      return '강사';
    }

    function getRequiredPinLengthForRole(role) {
      return role === 'admin' ? 6 : 4;
    }

    function getRequiredPinLengthForName(name) {
      return getRequiredPinLengthForRole(getTeacherRole(name));
    }

    function getStoredPinLength(teacher) {
      const rawPin = String(teacher?.pin || '').replace(/\D/g, '');
      if (rawPin.length) return rawPin.length;
      return getRequiredPinLengthForRole(getTeacherRole(teacher));
    }

    function getTeacherLoginLockText(teacher) {
      const lockUntil = teacher?.loginLockedUntil ? new Date(teacher.loginLockedUntil) : null;
      if (!lockUntil || Number.isNaN(lockUntil.getTime()) || lockUntil.getTime() <= Date.now()) return '';
      return `${lockUntil.getMonth() + 1}/${lockUntil.getDate()} ${String(lockUntil.getHours()).padStart(2,'0')}:${String(lockUntil.getMinutes()).padStart(2,'0')}까지 잠금`;
    }

    function getTierSystem(row) {
      const year = Number(row.year || 0);
      const grade = Number(row.grade || 0);
      if (year >= 2027) return 5;
      if (year === 2026 && grade === 3) return 9;
      return 5;
    }

    function bucketScore(score) {
      const n = Number(score || 0);
      const found = SCORE_BUCKETS.find((b) => n >= b.min && n <= b.max);
      return found ? found.label : '기타';
    }

    function examOrder(exam) {
      const idx = EXAMS.indexOf(exam);
      return idx === -1 ? 999 : idx;
    }

    function formatDateText(v) {
      if (!v) return '-';
      if (v && typeof v === 'object' && typeof v.seconds === 'number') {
        const d = new Date((v.seconds * 1000) + Math.floor((v.nanoseconds || 0) / 1000000));
        return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
      }
      const d = new Date(v);
      if (Number.isNaN(d.getTime())) return String(v);
      return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
    }

    function formatScoreDelta(curr, prev) {
      if (!prev) return '신규';
      const diff = Number(curr.score || curr || 0) - Number(prev.score || prev || 0);
      if (diff > 0) return <span className="text-emerald-600 font-bold">+{diff}점 ▲</span>;
      if (diff < 0) return <span className="text-rose-600 font-bold">{diff}점 ▼</span>;
      return <span className="text-slate-500 font-bold">유지</span>;
    }

    function formatTierDelta(curr, prev) {
      if (!prev) return '신규';
      const diff = Number(prev.tier || prev || 0) - Number(curr.tier || curr || 0);
      if (diff > 0) return <span className="text-emerald-600 font-bold">+{diff}등급 ▲</span>;
      if (diff < 0) return <span className="text-rose-600 font-bold">-{Math.abs(diff)}등급 ▼</span>;
      return <span className="text-slate-500 font-bold">유지</span>;
    }

    function renderDeltaBadge(type, value, unit='') {
      if (type === 'new') return <span className="delta-new">신규</span>;
      if (type === 'same') return <span className="delta-same">유지</span>;
      if (type === 'up') return <span className="delta-up">+{Math.abs(Number(value || 0))}{unit} ▲</span>;
      if (type === 'down') return <span className="delta-down">-{Math.abs(Number(value || 0))}{unit} ▼</span>;
      return <span className="delta-same">-</span>;
    }

    function safeLower(v) { return String(v || '').toLowerCase(); }


    function sanitizeKeyPart(value) {
      return String(value || '')
        .trim()
        .toLowerCase()
        .replace(/\s+/g, '-')
        .replace(/[^a-z0-9가-힣_-]/g, '_')
        .replace(/_+/g, '_')
        .replace(/-+/g, '-')
        .replace(/^[-_]+|[-_]+$/g, '') || 'blank';
    }

    function buildStudentDocId({ year, name }) {
      return `student__${sanitizeKeyPart(year)}__${sanitizeKeyPart(name)}`;
    }

    function buildScoreDocId({ studentId, year, exam, subject, detailSubject }) {
      return `score__${sanitizeKeyPart(studentId)}__${sanitizeKeyPart(year)}__${sanitizeKeyPart(exam)}__${sanitizeKeyPart(subject)}__${sanitizeKeyPart(detailSubject || 'common')}`;
    }

    function chunkArray(arr, size) {
      const result = [];
      for (let i = 0; i < arr.length; i += size) result.push(arr.slice(i, i + size));
      return result;
    }

    function normalizeDifficulty(value) {
      const raw = Number(value || 0);
      if (!raw) return 0;
      if (raw >= 1 && raw <= 5) return raw;
      if (raw === 6) return 4;
      if (raw >= 7) return 5;
      return 1;
    }

    function getAdaptiveNoteFontSize(text) {
      const len = String(text || '').replace(/\s+/g, ' ').trim().length;
      if (len > 320) return 10;
      if (len > 250) return 10.8;
      if (len > 190) return 11.5;
      if (len > 130) return 12.2;
      return 13;
    }

    function difficultyLabel(value) {
      const n = normalizeDifficulty(value);
      const map = {
        1: '하',
        2: '중하',
        3: '중상',
        4: '상',
        5: '최상',
      };
      return map[n] || '-';
    }

    function difficultyStars(value) {
      const n = normalizeDifficulty(value);
      if (!n) return '-';
      return '★'.repeat(n) + '☆'.repeat(5 - n);
    }

    function difficultyDisplayText(value) {
      const n = normalizeDifficulty(value);
      if (!n) return '-';
      return `${difficultyStars(n)} · ${difficultyLabel(n)}`;
    }

    function getSubjectPastelTheme(subject) {
      const key = String(subject || '').trim();
      const map = {
        '국어': { soft: '#fff1f2', border: '#f9a8d4', strong: '#be185d', tint: '#ffe4e6' },
        '영어': { soft: '#eefcf3', border: '#86efac', strong: '#15803d', tint: '#dcfce7' },
        '수학': { soft: '#eef4ff', border: '#93c5fd', strong: '#1d4ed8', tint: '#dbeafe' },
        '과학': { soft: '#fff7ed', border: '#fdba74', strong: '#c2410c', tint: '#ffedd5' },
        '사회': { soft: '#f5f3ff', border: '#c4b5fd', strong: '#6d28d9', tint: '#ede9fe' },
      };
      return map[key] || { soft: '#f8fafc', border: '#cbd5e1', strong: '#334155', tint: '#f1f5f9' };
    }

    function getDashboardCardMeta(key) {
      const map = {
        all: { label: '전체 학생 수', valueClass: 'text-slate-900', ringClass: 'border-slate-300 ring-slate-200', desc: '현재 선택 조건에 해당하는 전체 학생' },
        improved: { label: '상승 학생 수', valueClass: 'text-emerald-700', ringClass: 'border-emerald-300 ring-emerald-100', desc: '이전 동일 과목 시험 대비 +5점 이상 또는 1등급 이상 상승' },
        declined: { label: '하락 학생 수', valueClass: 'text-rose-700', ringClass: 'border-rose-300 ring-rose-100', desc: '이전 동일 과목 시험 대비 -5점 이하 또는 1등급 이상 하락' },
        topGroup: { label: '상위권 분포', valueClass: 'text-violet-700', ringClass: 'border-violet-300 ring-violet-100', desc: '원점수 90점 이상 또는 2등급 이내' },
        midGroup: { label: '중위권 분포', valueClass: 'text-sky-700', ringClass: 'border-sky-300 ring-sky-100', desc: '원점수 70~89점 또는 3등급' },
        riskGroup: { label: '위험권 분포', valueClass: 'text-amber-700', ringClass: 'border-amber-300 ring-amber-100', desc: '' },
      };
      return map[key] || map.all;
    }

    const DASHBOARD_CRITERIA_DEFAULTS = {
      scoreImprove: 5,
      scoreDecline: 5,
      tierImprove: 1,
      tierDecline: 1,
      topScore: 90,
      topTier: 2,
      midMinScore: 70,

      riskTier: 4,

    function buildDashboardCardDesc(key, criteria) {
      const c = criteria || DASHBOARD_CRITERIA_DEFAULTS;
      const map = {
        all: '현재 선택 조건에 해당하는 전체 학생',
        improved: `이전 동일 과목 시험 대비 +${c.scoreImprove}점 이상 또는 ${c.tierImprove}등급 이상 상승`,
        declined: `이전 동일 과목 시험 대비 -${c.scoreDecline}점 이하 또는 ${c.tierDecline}등급 이상 하락`,
        topGroup: `원점수 ${c.topScore}점 이상 또는 ${c.topTier}등급 이내`,
        midGroup: `원점수 ${c.midMinScore}점 이상 ${c.topScore - 1}점 이하이면서 상위권/위험권 제외`,
        riskGroup: `원점수 ${c.riskScore}점 미만 또는 ${c.riskTier}등급 이하`,
      };
      return map[key] || map.all;
    }

    function getSchoolRateStyle(tier) {
      const map = {
        1: { wrap: 'bg-violet-50 border-violet-200', bar: 'from-violet-500 to-fuchsia-500', text: 'text-violet-700', label: '1등급' },

        4: { wrap: 'bg-amber-50 border-amber-200', bar: 'from-amber-300 to-orange-300', text: 'text-amber-700', label: '4등급' },
        5: { wrap: 'bg-rose-50 border-rose-200', bar: 'from-rose-300 to-pink-300', text: 'text-rose-700', label: '5등급' },
      };
      return map[tier] || map[5];
    }

    function buildQuestionInfo(item) {
      const parts = [];
      if (item.objectiveCount || item.objectivePoints) {
        const count = item.objectiveCount ? `${item.objectiveCount}문항` : '';
        const points = item.objectivePoints ? `${item.objectivePoints}점` : '';
        parts.push(`객관식 ${[count, points].filter(Boolean).join(' · ')}`);
      }
      if (item.subjectiveCount || item.subjectivePoints) {
        const count = item.subjectiveCount ? `${item.subjectiveCount}문항` : '';
        const points = item.subjectivePoints ? `${item.subjectivePoints}점` : '';
        parts.push(`주관식 ${[count, points].filter(Boolean).join(' · ')}`);
      }
      return parts.length ? parts.join('\n') : '문항 정보 미입력';

    function compareStatus(curr, prev) {
      if (!prev) return { score: 'new', tier: 'new' };
      const score = Number(curr.score) > Number(prev.score) ? 'up' : Number(curr.score) < Number(prev.score) ? 'down' : 'same';
      const tier = Number(curr.tier) < Number(prev.tier) ? 'up' : Number(curr.tier) > Number(prev.tier) ? 'down' : 'same';
      return { score, tier };
    }

    function normalizeTeacherAnalysisTier(tier) {
      const n = Number(tier || 0);
      if (!n) return 0;
      return Math.min(n, 5); // 6~9등급은 5등급으로 처리
    }

    function findPreviousComparableRecord(currentRow, allRows) {
      const base = allRows
        .filter((r) => r.studentId === currentRow.studentId && r.subject === currentRow.subject)
        .filter((r) => Number(r.year) < Number(currentRow.year) || (Number(r.year) === Number(currentRow.year) && examOrder(r.exam) < examOrder(currentRow.exam)))
        .sort((a,b) => Number(a.year) - Number(b.year) || examOrder(a.exam) - examOrder(b.exam));
      if (!base.length) return null;
      const currentDetail = String(currentRow.detailSubject || '').trim();
      const sameDetail = currentDetail ? base.filter((r) => String(r.detailSubject || '').trim() === currentDetail) : [];
      if (sameDetail.length) return sameDetail[sameDetail.length - 1];
      const noDetail = base.filter((r) => !String(r.detailSubject || '').trim());
      if (noDetail.length) return noDetail[noDetail.length - 1];
      return base[base.length - 1];
    }

    function containsTestKeyword(value) {
      const v = String(value || '').trim().toLowerCase();
      if (!v) return false;
      return TEST_KEYWORDS.some((keyword) => v.includes(String(keyword).toLowerCase()));
    }

    function isLikelyTestStudent(student) {
      return [
        student?.name,
        student?.school,
        student?.customSchool,
        student?.createdBy,
        student?.updatedBy,
      ].some(containsTestKeyword);
    }

    function isLikelyTestScore(score, linkedStudentIds = new Set()) {
      return linkedStudentIds.has(score?.studentId) || [
        score?.subject,
        score?.detailSubject,
        score?.className,
        score?.createdBy,
        score?.updatedBy,
      ].some(containsTestKeyword);
    }

    function SimpleLineChart({ series }) {
      const width = 460; const height = 180;
      const points = series.map((v, idx) => ({
        x: 24 + (idx * ((width - 48) / Math.max(series.length - 1, 1))),
        y: 18 + ((100 - Math.min(Math.max(Number(v.score || 0), 0), 100)) / 100) * (height - 36),
      }));
      const poly = points.map((p) => `${p.x},${p.y}`).join(' ');
      return (
        <svg viewBox={`0 0 ${width} ${height}`} className="w-full h-[190px]">
          {[20,40,60,80].map((line) => (
            <line key={line} x1="20" y1={18 + ((100-line)/100)*(height-36)} x2={width-20} y2={18 + ((100-line)/100)*(height-36)} stroke="#e5e7eb" strokeDasharray="4 4" />
          ))}
          <polyline fill="none" stroke="#6d28d9" strokeWidth="4" strokeLinecap="round" strokeLinejoin="round" points={poly} />
          {points.map((p, idx) => (
            <g key={idx}>
              <circle cx={p.x} cy={p.y} r="6" fill="#fff" stroke="#6d28d9" strokeWidth="3" />
              <text x={p.x} y={height-8} fontSize="11" textAnchor="middle" fill="#64748b">{series[idx].exam.replace('고사','')}</text>
            </g>
          ))}
        </svg>
      );
    }

          const value = Number(teacher?.displayOrder);
          return Number.isFinite(value) ? value : index + 1;
        };
        const sorted = safeList.sort((a, b) => {
          const orderGap = getBaseOrder(a, 0) - getBaseOrder(b, 0);
          if (orderGap !== 0) return orderGap;
          if ((a.name||'') === '원장쌤' && (b.name||'') !== '원장쌤') return -1;
          if ((b.name||'') === '원장쌤' && (a.name||'') !== '원장쌤') return 1;

      const handleDeleteTestData = async () => {
        if (!db || !window.FirebaseAPI) return;
        const selectedIds = new Set(selectedTestStudentIds);
        const studentTargets = detectedTestStudents.filter((student) => selectedIds.has(student.studentId));
        const scoreTargets = scoresData.filter((score) => !score.deleted && (selectedIds.has(score.studentId) || isLikelyTestScore(score, selectedIds)));
        if (!studentTargets.length && !scoreTargets.length) {
          alert('삭제할 테스트 데이터가 없습니다.');
          return;
        }
        const namesText = studentTargets.map((student) => `${student.name} (${student.school || '-'})`).join(', ');

      const handleLogin = async (e) => {
        e.preventDefault();
        if (!teachersData.length) return setLoginError('시스템 준비가 아직 완료되지 않았습니다. 잠시 후 다시 시도해주세요.');
        if (!selectedTeacherName) return setLoginError('선생님을 선택해주세요.');
        const selectedTeacher = teachersData.find((teacher) => teacher.name === selectedTeacherName);
        if (!selectedTeacher) return setLoginError('선생님 정보를 찾을 수 없습니다.');
        if (selectedTeacher.isActive === false) return setLoginError('비활성화된 계정입니다. 관리자에게 문의해주세요.');
        const normalizedPin = String(loginPin || '').replace(/\D/g, '');
        const requiredLength = getStoredPinLength(selectedTeacher);
        if (normalizedPin.length !== requiredLength) return setLoginError(`PIN은 숫자 ${requiredLength}자리로 입력해주세요.`);

        const lockedUntilMs = selectedTeacher?.loginLockedUntil ? new Date(selectedTeacher.loginLockedUntil).getTime() : 0;
        if (selectedTeacher?.isLoginLocked && lockedUntilMs && lockedUntilMs > Date.now()) {
          return setLoginError(`로그인 제한 중입니다. ${getTeacherLoginLockText(selectedTeacher)} 관리자에게 문의해주세요.`);
        }

        const storedPin = String(selectedTeacher.pin || '').replace(/\D/g, '');
        if (storedPin !== normalizedPin) {
          const nextFailCount = Number(selectedTeacher.loginFailCount || 0) + 1;
          const shouldLock = nextFailCount >= LOGIN_MAX_ATTEMPTS;
          try {
            if (db && window.FirebaseAPI && selectedTeacher.teacherId) {
              const payload = {
                loginFailCount: nextFailCount,
                updatedAt: new Date().toISOString(),
                updatedBy: currentTeacher?.name || 'system',
              };
              if (shouldLock) {
                payload.isLoginLocked = true;
                payload.loginLockedUntil = new Date(Date.now() + (LOGIN_LOCK_MINUTES * 60 * 1000)).toISOString();
              }
              await window.FirebaseAPI.updateDoc(window.FirebaseAPI.doc(db, getPath('teachers'), selectedTeacher.teacherId), payload);
            }
          } catch (error) {
            console.error('로그인 실패 횟수 저장 실패:', error);
          }
          if (shouldLock) {
            return setLoginError(`PIN 오류가 ${LOGIN_MAX_ATTEMPTS}회 누적되어 로그인 제한이 걸렸습니다. 관리자에게 문의해주세요.`);
          }
          return setLoginError(`PIN이 올바르지 않습니다. (${nextFailCount}/${LOGIN_MAX_ATTEMPTS})`);
        }

        try {
          const now = Date.now();
          if (db && window.FirebaseAPI && selectedTeacher.teacherId && (selectedTeacher.loginFailCount || selectedTeacher.isLoginLocked || selectedTeacher.loginLockedUntil)) {
            await window.FirebaseAPI.updateDoc(window.FirebaseAPI.doc(db, getPath('teachers'), selectedTeacher.teacherId), {
              loginFailCount: 0,
              loginLockedUntil: '',
              isLoginLocked: false,
              updatedAt: new Date(now).toISOString(),
              updatedBy: selectedTeacher.name || '',

          lastActivityAtRef.current = now;

              logoutAt: '',

              sessionMs: 0,
              sessionDurationText: '',

              createdAt: new Date(now).toISOString(),

      // Excel Upload Handler: 학생 기본정보만 등록하고, 선생님 소유는 붙이지 않음
      const handleExcelUpload = (e) => {
        const file = e.target.files[0];
        if (!file || !db) return;
        const reader = new FileReader();
        reader.onload = async (evt) => {
          try {
            const data = evt.target.result;
            const workbook = XLSX.read(data, { type: 'binary' });
            const sheet = workbook.Sheets[workbook.SheetNames[0]];
            const json = XLSX.utils.sheet_to_json(sheet, { defval: '' });

            const { collection, query, where, getDocs, updateDoc, doc, getDoc, setDoc } = window.FirebaseAPI;
            let successCount = 0;
            let skipCount = 0;

            for (const row of json) {
              const name = String(row['학생명'] || '').trim();
              const school = String(row['학교'] || '').trim();
              const grade = Number(row['학년']);
              const year = Number(row['연도'] || 2026);
              const now = new Date().toISOString();

              if (!name || !school || !grade || !year) {
                skipCount++;
                continue;
              }

              const q = query(collection(db, getPath('students')), where('name', '==', name), where('year', '==', year));
              const snap = await getDocs(q);
              if (!snap.empty) {
                const studentId = snap.docs[0].id;
                await updateDoc(doc(db, getPath('students'), studentId), {
                  school,
                  grade,
                  updatedAt: now,
                  deleted: false,
                });
              } else {
                const studentId = buildStudentDocId({ year, name });
                const studentRef = doc(db, getPath('students'), studentId);
                const studentDoc = await getDoc(studentRef);
                await setDoc(studentRef, {
                  name,
                  year,
                  school,
                  grade,
                  updatedAt: now,
                  deleted: false,
                  ...(studentDoc.exists() ? {} : { createdAt: now }),
                }, { merge: true });
              }
              successCount++;
            }
            alert(`학생 기본정보 ${successCount}건 업로드 완료${skipCount ? ` / 건너뜀 ${skipCount}건` : ''}`);
            e.target.value = '';
          } catch(err) { alert('엑셀 처리 중 오류: ' + err.message); }
        };
        reader.readAsBinaryString(file);
      };


      const handleExportAllData = () => {

        try {
          const rows = [];
          const activeStudentRows = studentsData.filter((student) => !student.deleted);
          const activeScoreRows = scoresData.filter((score) => !score.deleted);
          const scoreMap = new Map();
          activeScoreRows.forEach((score) => {

            scoreMap.get(score.studentId).push(score);
          });

          activeStudentRows.forEach((student) => {
            const linkedScores = scoreMap.get(student.studentId) || [];
            if (!linkedScores.length) {
              rows.push({
                학생명: student.name || '',
                학교: student.school || '',
                학년: student.grade || '',
                연도: student.year || '',
                시험명: '',
                과목: '',
                세부과목: '',
                점수: '',
                등급: '',
                담당자: '',
                학원반: '',
                재원상태: student.isWithdrawn ? '퇴원' : '재원',
              });
              return;
            }
            linkedScores.slice().sort((a,b) => Number(a.year||student.year||0) - Number(b.year||student.year||0) || examOrder(a.exam) - examOrder(b.exam) || safeLower(a.subject||'').localeCompare(safeLower(b.subject||''), 'ko')).forEach((score) => {
              rows.push({

                학교: student.school || '',
                학년: student.grade || '',
                연도: student.year || score.year || '',
                시험명: score.exam || '',
                과목: score.subject || '',
                세부과목: score.detailSubject || '',

              });
            });

          const worksheet = XLSX.utils.json_to_sheet(rows);
          const workbook = XLSX.utils.book_new();
          XLSX.utils.book_append_sheet(workbook, worksheet, '전체성적');
          const today = new Date();

          alert('엑셀 내보내기 중 오류가 발생했습니다: ' + error.message);

      const sortRows = (rows, sortState, mapper = {}) => {

          const av = getVal(a); const bv = getVal(b);
          if (av < bv) return sortState.direction === 'asc' ? -1 : 1;

        iframe.setAttribute('aria-hidden', 'true');
        iframe.style.position = 'fixed';
        iframe.style.right = '0';
        iframe.style.bottom = '0';

        iframe.style.height = '1px';

        iframe.style.pointerEvents = 'none';
        iframe.style.border = '0';
        document.body.appendChild(iframe);
        const cleanup = () => {
          setTimeout(() => {
            if (iframe && iframe.parentNode) iframe.parentNode.removeChild(iframe);

          const doc = iframe.contentWindow.document;

                            {SCHOOL_OPTIONS.map((school) => <button type="button" key={school} onClick={()=>setTeamExamForm({...teamExamForm, school: school})} className={`px-4 py-2 btn-pill text-sm ${teamExamForm.school === school ? 'btn-pill-active' : 'btn-pill-inactive'}`}>{school}</button>)}
                          </div>
                        </div>
                        <div className="rounded-2xl border border-amber-200 bg-amber-50/50 p-4">
                          <div className="text-xs font-black text-amber-700 mb-3">3. 시험 선택</div>
                          <div className="flex flex-wrap gap-2">
                            {EXAMS.map(ex => <button type="button" key={ex} onClick={()=>setTeamExamForm({...teamExamForm, exam: ex})} className={`px-4 py-2 btn-pill text-sm ${teamExamForm.exam === ex ? 'btn-pill-active' : 'btn-pill-inactive'}`}>{EXAM_SHORT_LABELS[ex]}</button>)}
                          </div>
                        </div>
                      </div>
                      <div className="grid md:grid-cols-4 gap-4">
                        <select value={teamExamForm.grade} onChange={e=>setTeamExamForm({...teamExamForm, grade:Number(e.target.value)})} className="border border-slate-300 rounded-xl p-2.5">{GRADES.map(g=><option key={g} value={g}>{g}학년</option>)}</select>
                        <select value={teamExamForm.subject} onChange={e=>{ setTeamExamCustomDetail(''); setTeamExamForm({...teamExamForm, subject:e.target.value, detailSubject:''}); }} className="border border-slate-300 rounded-xl p-2.5">{subjectOptions.map(s=><option key={s} value={s}>{s}</option>)}</select>
                        <div className="space-y-2">
                          <select value={isTeamExamCustomDetail ? '__custom__' : teamExamForm.detailSubject} onChange={e=>{
                            const value = e.target.value;
                            if (value === '__custom__') {
                              setTeamExamCustomDetail('');
                              setTeamExamForm({...teamExamForm, detailSubject:'__custom__'});
                            } else {
                              setTeamExamCustomDetail('');
                              setTeamExamForm({...teamExamForm, detailSubject:value});
                            }
                          }} className="w-full border border-slate-300 rounded-xl p-2.5">
                            <option value="">세부과목 선택</option>
                            {teamExamDetailOptions.map((detail)=><option key={`${teamExamForm.subject}-${detail}`} value={detail}>{detail}</option>)}
                            <option value="__custom__">직접 입력</option>
                          </select>
                          {isTeamExamCustomDetail ? <input value={teamExamCustomDetail} onChange={e=>setTeamExamCustomDetail(e.target.value)} placeholder="세부과목 직접 입력" className="w-full border border-slate-300 rounded-xl p-2.5" /> : null}
                        </div>
                        <select value={teamExamForm.difficulty} onChange={e=>setTeamExamForm({...teamExamForm, difficulty:Number(e.target.value)})} className="border border-slate-300 rounded-xl p-2.5">
                          {[
                            { value: 1, label: '★ 하' },
                            { value: 2, label: '★★ 중하' },
                            { value: 3, label: '★★★ 중상' },
                            { value: 4, label: '★★★★ 상' },
                            { value: 5, label: '★★★★★ 최상' },
                          ].map(item => <option key={item.value} value={item.value}>{item.label}</option>)}
                        </select>
                      </div>
                      <div className="grid md:grid-cols-4 gap-4">
                        <input value={teamExamForm.objectiveCount} onChange={e=>setTeamExamForm({...teamExamForm, objectiveCount:e.target.value})} type="number" min="0" placeholder="객 문항수" className="border border-slate-300 rounded-xl p-2.5" />
                        <input value={teamExamForm.objectivePoints} onChange={e=>setTeamExamForm({...teamExamForm, objectivePoints:e.target.value})} type="number" min="0" placeholder="객 배점" className="border border-slate-300 rounded-xl p-2.5" />
                        <input value={teamExamForm.subjectiveCount} onChange={e=>setTeamExamForm({...teamExamForm, subjectiveCount:e.target.value})} type="number" min="0" placeholder="주 문항수" className="border border-slate-300 rounded-xl p-2.5" />
                        <input value={teamExamForm.subjectivePoints} onChange={e=>setTeamExamForm({...teamExamForm, subjectivePoints:e.target.value})} type="number" min="0" placeholder="주 배점" className="border border-slate-300 rounded-xl p-2.5" />
                      </div>
                      <div className="grid md:grid-cols-4 gap-4">
                        <input value={teamExamForm.cut1} onChange={e=>setTeamExamForm({...teamExamForm, cut1:e.target.value})} type="number" min="0" max="100" placeholder="1등급컷 원점수" className="border border-slate-300 rounded-xl p-2.5" />
                        <input value={teamExamForm.cut2} onChange={e=>setTeamExamForm({...teamExamForm, cut2:e.target.value})} type="number" min="0" max="100" placeholder="2등급컷 원점수" className="border border-slate-300 rounded-xl p-2.5" />
                        <input value={teamExamForm.cut3} onChange={e=>setTeamExamForm({...teamExamForm, cut3:e.target.value})} type="number" min="0" max="100" placeholder="3등급컷 원점수" className="border border-slate-300 rounded-xl p-2.5" />
                        <input value={teamExamForm.cut4} onChange={e=>setTeamExamForm({...teamExamForm, cut4:e.target.value})} type="number" min="0" max="100" placeholder="4등급컷 원점수" className="border border-slate-300 rounded-xl p-2.5" />
                      </div>
                      <div className="grid md:grid-cols-2 gap-4">
                        <input value={teamExamForm.review} onChange={e=>setTeamExamForm({...teamExamForm, review:e.target.value})} placeholder="총평" className="border border-slate-300 rounded-xl p-2.5" />
                        <input value={teamExamForm.specialNote} onChange={e=>setTeamExamForm({...teamExamForm, specialNote:e.target.value})} placeholder="특이사항" className="border border-slate-300 rounded-xl p-2.5" />
                      </div>
                      <div className="flex flex-wrap items-center justify-between gap-3">
                        <div className="text-xs text-slate-500">등급컷 원점수는 몰라도 저장되도록 선택 입력으로 처리했습니다.</div>
                        {editingTeamExamId ? <span className="rounded-full border border-amber-300 bg-amber-50 px-3 py-1 text-xs font-black text-amber-700">수정 모드</span> : null}
                      </div>
                      <div className="flex flex-wrap gap-3">
                        <button type="submit" className="rounded-2xl bg-gradient-to-r from-violet-700 to-indigo-600 text-white font-black px-5 py-3">{editingTeamExamId ? '시험 분석 수정 저장' : '시험 분석 저장'}</button>
                        {editingTeamExamId ? <button type="button" onClick={cancelEditTeamExam} className="rounded-2xl border border-slate-300 bg-white px-5 py-3 text-sm font-black text-slate-700">수정 취소</button> : null}
                      </div>
                    </form>
                  </Card>

                  <Card title="학부모 공개용 카드뉴스 출력" className="print-hide" right={<button type="button" onClick={printTeamExamCards} className="rounded-full bg-gradient-to-r from-violet-700 to-indigo-600 px-4 py-2 text-xs font-black text-white shadow-md"><i className="fas fa-print mr-2"></i>카드뉴스 인쇄</button>}>
                    <div className="teamprint-toolbar-card rounded-[24px] p-4">
                      <div className="grid md:grid-cols-5 gap-3">
                        <select value={teamExamPublicFilters.year} onChange={(e)=>setTeamExamPublicFilters({...teamExamPublicFilters, year:e.target.value})} className="border border-slate-300 rounded-xl p-2.5">
                          <option value="전체">전체 연도</option>
                          {YEARS.map((y)=><option key={y} value={y}>{y}년</option>)}
                        </select>
                        <select value={teamExamPublicFilters.exam} onChange={(e)=>setTeamExamPublicFilters({...teamExamPublicFilters, exam:e.target.value})} className="border border-slate-300 rounded-xl p-2.5">
                          <option value="전체">전체 시험</option>
                          {EXAMS.map((ex)=><option key={ex} value={ex}>{EXAM_SHORT_LABELS[ex]}</option>)}
                        </select>
                        <select value={teamExamPublicFilters.school} onChange={(e)=>setTeamExamPublicFilters({...teamExamPublicFilters, school:e.target.value})} className="border border-slate-300 rounded-xl p-2.5">
                          <option value="전체">전체 학교</option>
                          {SCHOOL_OPTIONS.map((school)=><option key={school} value={school}>{school}</option>)}
                        </select>
                        <select value={teamExamPublicFilters.grade} onChange={(e)=>setTeamExamPublicFilters({...teamExamPublicFilters, grade:e.target.value})} className="border border-slate-300 rounded-xl p-2.5">
                          <option value="전체">전체 학년</option>
                          {GRADES.map((g)=><option key={g} value={g}>{g}학년</option>)}
                        </select>
                        <select value={teamExamPublicFilters.subject} onChange={(e)=>setTeamExamPublicFilters({...teamExamPublicFilters, subject:e.target.value})} className="border border-slate-300 rounded-xl p-2.5">
                          <option value="전체">전체 과목</option>
                          {subjectOptions.map((subject)=><option key={subject} value={subject}>{subject}</option>)}
                        </select>
                      </div>
                      <div className="mt-3 text-xs leading-6 text-slate-500">
                        선택한 시험 데이터가 A4 한 장당 4개 카드 형태로 정리됩니다. 학부모님 밴드 공개용으로 바로 인쇄하거나 PDF 저장하면 됩니다.
                      </div>
                    </div>
                  </Card>

                  <Card title="시험 분석 아카이브" right={<span className="text-xs text-slate-400">헤더 클릭 정렬</span>}>
                    <div className="flex flex-wrap gap-2 mb-4">
                      <button type="button" onClick={()=>setTeamExamFilters({...teamExamFilters, year:'전체'})} className={`px-4 py-2 btn-pill text-sm ${teamExamFilters.year === '전체' ? 'btn-pill-active' : 'btn-pill-inactive'}`}>전체 연도</button>
                      {YEARS.map(y => <button type="button" key={y} onClick={()=>setTeamExamFilters({...teamExamFilters, year:y})} className={`px-4 py-2 btn-pill text-sm ${teamExamFilters.year === y ? 'btn-pill-active' : 'btn-pill-inactive'}`}>{y}년</button>)}
                      <button type="button" onClick={()=>setTeamExamFilters({...teamExamFilters, school:'전체'})} className={`px-4 py-2 btn-pill text-sm ${teamExamFilters.school === '전체' ? 'btn-pill-active' : 'btn-pill-inactive'}`}>전체 학교</button>
                      {SCHOOL_OPTIONS.map(school => <button type="button" key={school} onClick={()=>setTeamExamFilters({...teamExamFilters, school})} className={`px-4 py-2 btn-pill text-sm ${teamExamFilters.school === school ? 'btn-pill-active' : 'btn-pill-inactive'}`}>{school}</button>)}
                    </div>
                    <div className="overflow-x-auto mini-scroll teamexam-archive-table">
                      <table className="w-full text-sm text-center">
                        <thead className="bg-slate-50 text-slate-500 text-xs uppercase font-bold border-b">
                          <tr>{[['year','연도'],['exam','시험'],['school','학교'],['grade','학년'],['subject','과목'],['detailSubject','세부과목'],['difficulty','난이도'],['reviewNote','총평 및 특이사항']].map(([key,label]) => <th key={key} className="py-3 table-sort" onClick={() => setTeamExamSort((p) => ({ key, direction: p.key === key && p.direction === 'desc' ? 'asc' : 'desc' }))}>{label}</th>)}<th className="py-3">관리</th></tr>
                        </thead>
                        <tbody className="divide-y divide-slate-100">
                          {teamExamArchiveRows.length ? teamExamArchiveRows.map((item) => <tr key={item.docId}><td className="py-3">{item.year}</td><td>{EXAM_SHORT_LABELS[item.exam] || item.exam}</td><td>{item.school || '-'}</td><td>{item.grade ? `${item.grade}학년` : '-'}</td><td>{item.subject || '-'}</td><td>{item.detailSubject || '-'}</td><td>{difficultyDisplayText(item.difficulty)}</td><td className="text-left px-3">{item.reviewNote || '-'}</td><td><div className="flex items-center justify-center gap-2"><button type="button" onClick={()=>handleEditTeamExam(item)} className="rounded-full border border-violet-200 bg-violet-50 px-3 py-1 text-xs font-black text-violet-700">수정</button><button type="button" onClick={()=>handleDeleteTeamExam(item.docId)} className="rounded-full border border-rose-200 bg-rose-50 px-3 py-1 text-xs font-black text-rose-600">삭제</button></div></td></tr>) : <tr><td colSpan="9" className="py-10 text-slate-400">저장된 시험 분석이 없습니다.</td></tr>}
                        </tbody>
                      </table>
                    </div>
                  </Card>
                </div>

                <div className="teamprint-root space-y-6">
                  {teamExamPublicPages.length ? teamExamPublicPages.map((page, pageIndex) => (
                    <div key={`teamprint-page-${pageIndex}`} className="teamprint-page">
                      <div className="teamprint-grid">
                        {page.map((item) => (
                          <div key={item.docId} className="teamprint-card">
                            <div className="teamprint-card-header">
                              <div className="w-full space-y-2">
                                <div className="flex items-start justify-between gap-4">
                                  <div className="teamprint-title-line">{item.school || '-'} · {item.grade ? `${item.grade}학년` : '-'}</div>
                                  <div className="teamprint-chip-row shrink-0">
                                    <span className="teamprint-badge">{EXAM_SHORT_LABELS[item.exam] || item.exam}</span>
                                    <span className="teamprint-year-badge">{item.year}년</span>
                                  </div>
                                </div>
                                <div className="teamprint-subtitle">{item.subject || '-'}{item.detailSubject ? ` (${item.detailSubject})` : ''}</div>
                              </div>
                            </div>

                            <div className="teamprint-highlight-bar">
                              <div className="teamprint-highlight-item">
                                <div className="teamprint-highlight-label">문항구성</div>
                                <div className="teamprint-highlight-value compact">{item.questionInfo}</div>
                              </div>
                              <div className="teamprint-highlight-item">
                                <div className="teamprint-highlight-label">시험 난이도</div>
                                <div className="teamprint-difficulty-stars">{item.difficultyStars}</div>
                                <div className="teamprint-difficulty-text">{item.difficultyLabelText}</div>
                              </div>
                            </div>

                            <div className="teamprint-note-box">
                              <div className="teamprint-note-title">총평 및 특이사항</div>
                              <div className="teamprint-note-text" style={{ fontSize: `${item.noteFontSize}px` }}>{item.noteText}</div>
                            </div>

                            <div className="teamprint-footer">
                              <span>{item.school || '-'} {item.grade ? `${item.grade}학년` : ''} 분석 리포트</span>
                              <span>열린학원 시험 분석</span>
                            </div>
                          </div>
                        ))}
                      </div>
                    </div>
                  )) : (
                    <Card title="카드뉴스 미리보기">
                      <div className="py-16 text-center text-slate-400">선택한 조건에 맞는 시험 분석 데이터가 없습니다.</div>
                    </Card>
                  )}
                </div>
              </div>
            )}


          </main>


          {/* Modal */}
          {modal.isOpen && (
            <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/50 p-4">
              <div className="bg-white rounded-[24px] w-full max-w-sm overflow-hidden shadow-2xl">
                <div className="bg-violet-700 p-4 text-white font-black flex justify-between">
                  <span>{modalForm.exam} {modalForm.subject} {modal.mode === 'edit' ? '수정' : '입력'}</span>
                  <button onClick={()=>setModal({isOpen:false})}><i className="fas fa-times"></i></button>
                </div>
                <form onSubmit={handleModalSubmit} className="p-6 space-y-4">
                  <div>
                    <label className="block text-sm font-bold text-slate-700 mb-1">과목</label>
                    <select value={modalForm.subject} onChange={e=>setModalForm({...modalForm, subject: e.target.value, detailSubject: '', customDetailSubject: ''})} className="w-full border p-2.5 rounded-xl outline-none focus:border-violet-500 bg-white">
                      {subjectOptions.map((subject)=><option key={subject} value={subject}>{subject}</option>)}
                    </select>
                  </div>
                  <div>
                    <label className="block text-sm font-bold text-slate-700 mb-1">세부과목</label>
                    <select value={modalForm.detailSubject} onChange={e=>setModalForm({...modalForm, detailSubject: e.target.value})} className="w-full border p-2.5 rounded-xl outline-none focus:border-violet-500 bg-white">
                      <option value="">세부과목 선택</option>
                      {(subjectDetailMap[modalForm.subject] || []).map((detail)=><option key={`${modalForm.subject}-${detail}`} value={detail}>{detail}</option>)}
                      <option value="__custom__">직접 입력</option>
                    </select>
                    {(modalForm.detailSubject === '__custom__' || ((subjectDetailMap[modalForm.subject] || []).length === 0 && !modalForm.detailSubject)) && (
                      <input type="text" value={modalForm.customDetailSubject || ''} onChange={e=>setModalForm({...modalForm, detailSubject: '__custom__', customDetailSubject: e.target.value})} placeholder="세부과목 직접 입력" className="w-full border mt-2 p-2.5 rounded-xl outline-none focus:border-violet-500 bg-white" />
                    )}
                    <div className="mt-2 text-[11px] text-slate-500">목록에 없으면 직접 입력해 저장할 수 있고, 저장 후에는 다음부터 선택 목록에 자동 추가됩니다.</div>
                  </div>
                  <div className="flex gap-4">
                    <div className="flex-1">
                      <label className="block text-sm font-bold text-slate-700 mb-1">원점수</label>
                      <input type="number" required min="0" max="100" value={modalForm.score} onChange={e=>setModalForm({...modalForm, score: e.target.value})} className="w-full border-2 border-slate-200 bg-slate-50 p-3 rounded-xl text-center text-xl font-black outline-none focus:border-violet-500" />
                    </div>
                    <div className="flex-1">
                      <label className="block text-sm font-bold text-violet-700 mb-1">등급</label>
                      <input type="number" required min="1" max="9" value={modalForm.tier} onChange={e=>setModalForm({...modalForm, tier: e.target.value})} className="w-full border-2 border-violet-200 bg-violet-50 p-3 rounded-xl text-center text-xl font-black text-violet-700 outline-none focus:border-violet-500" />
                      <div className="text-[10px] text-violet-500 mt-1 text-center font-bold">※ 6~9등급은 5등급 자동처리</div>
                    </div>
                  </div>
                  <div className="flex gap-3 pt-2">
                    {modal.mode === 'edit' && <button type="button" onClick={handleDeleteScore} className="w-1/3 bg-rose-50 text-rose-600 border border-rose-200 font-black py-3 rounded-xl">삭제</button>}
                    <button type="submit" className={`${modal.mode === 'edit' ? 'w-2/3' : 'w-full'} bg-violet-700 text-white font-black py-3 rounded-xl`}>{modal.mode === 'edit' ? '수정 저장' : '저장하기'}</button>
                  </div>
                </form>
              </div>
            </div>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<ErrorBoundary><App /></ErrorBoundary>);
  </script>
</body>
</html>
